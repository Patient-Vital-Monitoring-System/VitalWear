<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Incident - VitalWear</title>
<script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --deep-hospital-blue: #0A2A55;
    --medical-cyan: #00B6CC;
    --trust-blue: #0A85CC;
    --health-green: #2EDBB3;
    --clinical-white: #F0F4F8;
    --system-gray: #A9B7C6;
    --surface: #ffffff;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
    --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
    --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--clinical-white);
    color: var(--deep-hospital-blue);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ── Sidebar ── */
#sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid rgba(169, 183, 198, 0.3);
    box-shadow: var(--shadow);
    z-index: 1000;
    overflow-y: auto;
}

.sidebar-logo {
    padding: 24px 20px;
    text-align: center;
    background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
    margin: 12px;
    border-radius: var(--radius);
}

.sidebar-logo i {
    font-size: 48px;
    color: white;
}

#sidebar a {
    color: var(--deep-hospital-blue);
    margin: 6px 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    transition: all 0.2s ease;
    border: none;
    font-weight: 500;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 12px;
}

#sidebar a:hover {
    background: rgba(0, 182, 204, 0.1);
    color: var(--medical-cyan);
    transform: translateX(4px);
}

#sidebar a.active {
    background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
    color: white;
    box-shadow: var(--shadow-sm);
}

/* ── Topbar ── */
.topbar {
    position: fixed;
    top: 0;
    left: 280px;
    right: 0;
    background: var(--surface);
    color: var(--deep-hospital-blue);
    border-bottom: 1px solid rgba(169, 183, 198, 0.2);
    box-shadow: var(--shadow-sm);
    padding: 16px 24px;
    font-weight: 600;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* ── Main Container ── */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px;
    margin-left: 280px;
    margin-top: 80px;
}

/* ── Card ── */
.dashboard-card {
    background: var(--surface);
    padding: 32px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    border: 1px solid rgba(169, 183, 198, 0.2);
    margin-bottom: 20px;
    transition: all 0.3s ease;
}

.dashboard-card:hover {
    box-shadow: var(--shadow-md);
}

/* ── Form Elements ── */
.form-group {
    margin-bottom: 24px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--deep-hospital-blue);
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 14px;
    border: 2px solid rgba(169, 183, 198, 0.3);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    color: var(--deep-hospital-blue);
    background: var(--surface);
    transition: all 0.2s ease;
    outline: none;
}

.form-group input:focus {
    border-color: var(--medical-cyan);
    box-shadow: 0 0 0 3px rgba(0, 182, 204, 0.1);
}

.btn-submit {
    width: 100%;
    padding: 16px 24px;
    background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'Inter', sans-serif;
}

.btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
}

/* ── Message ── */
#message {
    background: rgba(46, 219, 179, 0.15);
    color: var(--health-green);
    padding: 16px 24px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    text-align: center;
    font-weight: 600;
    border: 1px solid rgba(46, 219, 179, 0.3);
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

/* ── Mobile menu toggle — hidden on desktop ── */
.mobile-menu-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 1001;
    background: var(--medical-cyan);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 10px;
    cursor: pointer;
    font-size: 18px;
}

/* ── Bottom nav — hidden on desktop ── */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid rgba(169, 183, 198, 0.3);
    box-shadow: 0 -4px 20px rgba(10, 42, 85, 0.08);
    padding: 12px 24px;
    display: none;
    justify-content: space-around;
    align-items: center;
    z-index: 998;
}

.bottom-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius);
    color: var(--system-gray);
    text-decoration: none;
    transition: all 0.3s ease;
    font-weight: 500;
    font-size: 12px;
}

.bottom-item i {
    font-size: 20px;
    transition: all 0.3s ease;
}

.bottom-item:hover {
    color: var(--medical-cyan);
    background: rgba(0, 182, 204, 0.1);
    transform: translateY(-2px);
}

.bottom-item.active {
    color: var(--medical-cyan);
    background: rgba(0, 182, 204, 0.15);
}

.bottom-item.active i {
    transform: scale(1.1);
}

/* ══════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════ */

@media (max-width: 1200px) {
    .container { padding: 16px; }
    .dashboard-card { padding: 24px; }
}

@media (max-width: 992px) {
    .container { padding: 12px; }
    .dashboard-card { padding: 20px; }
}

@media (max-width: 768px) {

    /* Show mobile menu toggle */
    .mobile-menu-toggle { display: block; }

    /* Show bottom nav */
    .bottom-nav {
        display: flex;
        padding: 8px 12px;
        height: 70px;
    }

    .bottom-item { padding: 8px 12px; font-size: 11px; }
    .bottom-item i { font-size: 18px; }

    /* Push content — no sidebar offset */
    .container {
        margin-left: 0;
        margin-top: 64px;
        padding: 16px;
        padding-bottom: 90px;
    }

    /* Hide sidebar off-screen; slide in when toggled */
    #sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        width: 280px;
    }

    #sidebar.mobile-open { transform: translateX(0); }

    /* Topbar stretches full width */
    .topbar {
        left: 0;
        padding: 12px 16px 12px 60px;
        height: auto;
        min-height: 60px;
    }

    .topbar div:first-child { font-size: 16px; }
    .topbar div:last-child  { font-size: 14px; }

    .dashboard-card { padding: 20px 16px; margin-bottom: 16px; }

    h2 { font-size: 1.5rem; }

    .form-group input { padding: 16px; font-size: 16px; }
    .btn-submit { padding: 18px 24px; font-size: 16px; }
}

@media (max-width: 480px) {
    .container { padding: 12px; padding-bottom: 90px; }
    .dashboard-card { padding: 16px 12px; }

    h2 { font-size: 1.3rem; }

    .form-group input { padding: 14px; font-size: 16px; }
    .btn-submit { padding: 16px 20px; font-size: 15px; }

    .topbar { padding: 10px 12px 10px 56px; }
    .topbar div:first-child span { font-size: 14px; }
    .topbar div:last-child  span { font-size: 12px; }

    .bottom-nav { padding: 6px 4px; height: 65px; }
    .bottom-item { font-size: 10px; padding: 6px 4px; }
    .bottom-item i { font-size: 16px; }
}

@media (max-width: 360px) {
    .container { padding: 8px; padding-bottom: 90px; }
    .dashboard-card { padding: 12px 8px; }

    h2 { font-size: 1.2rem; }

    .form-group input { padding: 12px; font-size: 15px; }
    .btn-submit { padding: 14px 16px; font-size: 14px; }

    .topbar div:first-child i    { font-size: 20px; }
    .topbar div:first-child span { font-size: 12px; }

    .mobile-menu-toggle { padding: 8px; font-size: 16px; }
}
</style>
</head>
<body>

<!-- Mobile hamburger — desktop: hidden -->
<button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
    <i class="fa fa-bars"></i>
</button>

<!-- Topbar -->
<header class="topbar">
    <div style="display: flex; align-items: center; gap: 12px;">
        <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
        <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
        <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
        <span id="responder-name">Responder</span>
    </div>
</header>

<!-- Sidebar — desktop: always visible; mobile: slides in -->
<nav id="sidebar">
    <div class="sidebar-logo">
        <i class="fa fa-heart-pulse"></i>
    </div>
    <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
    <a href="device.html"><i class="fa fa-tablet"></i> My Device</a>
    <a href="active-incidents.html"><i class="fa fa-exclamation-circle"></i> Active Incidents</a>
    <a href="create-incident.html" class="active"><i class="fa fa-plus-circle"></i> Create Incident</a>
    <a href="transfer-incident.html"><i class="fa fa-exchange"></i> Transfer to Rescuer</a>
    <a href="incident-history.html"><i class="fa fa-history"></i> Incident History</a>
    <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
</nav>

<!-- Main Content -->
<main class="container">

    <div style="max-width: 500px; width: 100%;">

        <h2 style="color: var(--deep-hospital-blue); margin-bottom: 24px; font-weight: 700; font-size: 1.75rem; text-align: center;">
            ➕ Create Incident
        </h2>

        <!-- Feedback message -->
        <div id="message">
            <i class="fa fa-check-circle"></i>
            <span id="message-text"></span>
        </div>

        <div class="dashboard-card">
            <form id="incident-form" method="POST">

                <div class="form-group">
                    <label>
                        <i class="fa fa-user" style="color: var(--medical-cyan); margin-right: 8px;"></i>Patient Name *
                    </label>
                    <input type="text" name="pat_name" required placeholder="Enter patient name">
                </div>

                <div class="form-group">
                    <label>
                        <i class="fa fa-phone" style="color: var(--medical-cyan); margin-right: 8px;"></i>Contact Number
                    </label>
                    <input type="text" name="pat_contact" placeholder="Enter contact number">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa fa-plus-circle" style="font-size: 20px;"></i>
                    Create Incident &amp; Record Vitals
                </button>

            </form>
        </div>

    </div>

</main>

<!-- Bottom nav — mobile only (display:none on desktop via CSS) -->
<nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-item"><i class="fa fa-gauge"></i><span>Home</span></a>
    <a href="device.html" class="bottom-item"><i class="fa fa-tablet"></i><span>Device</span></a>
    <a href="create-incident.html" class="bottom-item active"><i class="fa fa-plus-circle"></i><span>Incident</span></a>
    <a href="incident-history.html" class="bottom-item"><i class="fa fa-history"></i><span>History</span></a>
    <a href="#" onclick="logout()" class="bottom-item"><i class="fa fa-sign-out"></i><span>Logout</span></a>
</nav>

<script src="../js/database.js"></script>
<script>
function getCurrentUser() {
    const role = sessionStorage.getItem('current_role');
    return window.vitalwearDB.getUsers(role)[0] || { name: 'Responder User', role: 'responder', id: 5 };
}

function checkAuth() {
    const role = sessionStorage.getItem('current_role');
    if (role !== 'responder') {
        window.location.href = '../index.html';
    }
}

function logout() {
    sessionStorage.clear();
    window.location.href = '../index.html';
}

function toggleMobileMenu() {
    document.getElementById('sidebar').classList.toggle('mobile-open');
}

function showMessage(text, type = 'success') {
    const messageDiv = document.getElementById('message');
    const messageText = document.getElementById('message-text');

    messageText.textContent = text;
    messageDiv.style.display = 'flex';

    if (type === 'error') {
        messageDiv.style.background = 'rgba(239, 68, 68, 0.15)';
        messageDiv.style.color = '#dc2626';
        messageDiv.style.borderColor = 'rgba(239, 68, 68, 0.3)';
        messageDiv.querySelector('i').className = 'fa fa-exclamation-circle';
    } else {
        messageDiv.style.background = 'rgba(46, 219, 179, 0.15)';
        messageDiv.style.color = 'var(--health-green)';
        messageDiv.style.borderColor = 'rgba(46, 219, 179, 0.3)';
        messageDiv.querySelector('i').className = 'fa fa-check-circle';
    }

    setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
}

function createIncident(event) {
    event.preventDefault();

    const formData = new FormData(event.target);
    const patientName = formData.get('pat_name');
    const patientContact = formData.get('pat_contact');

    if (!patientName || patientName.trim() === '') {
        showMessage('Patient name is required', 'error');
        return;
    }

    const user = getCurrentUser();

    const incidentData = {
        patient_name: patientName.trim(),
        patient_contact: patientContact ? patientContact.trim() : '',
        patient_age: 0,
        patient_condition: 'Emergency incident',
        incident_location: 'Unknown',
        incident_type: 'emergency',
        incident_severity: 'unknown',
        responder_id: user.id,
        created_at: new Date().toISOString(),
        status: 'ongoing'
    };

    const newIncident = window.vitalwearDB.createIncident(incidentData);

    if (newIncident && newIncident.id) {
        const vitalData = {
            incident_id: newIncident.id,
            heart_rate: 0,
            bp_systolic: 0,
            bp_diastolic: 0,
            oxygen_level: 0,
            recorded_at: new Date().toISOString()
        };

        window.vitalwearDB.addVital(vitalData);
        window.vitalwearDB.logActivity(user.name, 'responder', `Created incident #${newIncident.id} for ${patientName}`);

        showMessage('Incident created successfully! Redirecting to vitals...', 'success');

        setTimeout(() => {
            window.location.href = `patient-vitals.html?incident_id=${newIncident.id}`;
        }, 2000);
    } else {
        showMessage('Failed to create incident', 'error');
    }
}

document.addEventListener('DOMContentLoaded', function () {
    checkAuth();
    document.getElementById('responder-name').textContent = getCurrentUser().name;
    document.getElementById('incident-form').addEventListener('submit', createIncident);
});

// Close sidebar when tapping outside on mobile
document.addEventListener('click', function (event) {
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    if (window.innerWidth <= 768 &&
        !sidebar.contains(event.target) &&
        !menuToggle.contains(event.target) &&
        sidebar.classList.contains('mobile-open')) {
        sidebar.classList.remove('mobile-open');
    }
});
</script>

</body>
</html>
