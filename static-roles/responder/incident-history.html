<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident History - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* VitalWear Soft UI Design System */
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Soft UI Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px;
            border-radius: var(--radius);
        }

        .sidebar-logo i {
            font-size: 48px;
            color: white;
        }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: rgba(0, 182, 204, 0.1);
            color: var(--medical-cyan);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        /* Soft UI Header */
        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--deep-hospital-blue);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h2, h3, h4 {
            color: var(--deep-hospital-blue);
            font-weight: 700;
        }

        /* Soft UI Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
        }

        /* Soft UI Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Dashboard Cards */
        .dashboard-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
            padding: 24px;
        }

        /* Quick Action Buttons */
        .btn-quick-action {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-lg);
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-quick-action:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-ongoing {
            background: rgba(245, 158, 11, 0.15);
            color: #d97706;
        }

        .status-transferred {
            background: rgba(59, 130, 246, 0.15);
            color: #2563eb;
        }

        .status-completed {
            background: rgba(107, 114, 128, 0.15);
            color: #4b5563;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            margin-left: 280px;
            margin-top: 80px;
            display: block;
            overflow-y: auto;
            width: 100%;
        }

        /* Bottom nav — hidden on desktop */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: 0 -4px 20px rgba(10, 42, 85, 0.08);
            padding: 12px 24px;
            display: none;
            justify-content: space-around;
            align-items: center;
            z-index: 998;
        }

        .bottom-nav .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius);
            color: var(--system-gray);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 12px;
        }

        .bottom-nav .bottom-item i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .bottom-nav .bottom-item:hover {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.1);
            transform: translateY(-2px);
        }

        .bottom-nav .bottom-item.active {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.15);
        }

        .bottom-nav .bottom-item.active i {
            transform: scale(1.1);
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--medical-cyan);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {

            .mobile-menu-toggle {
                display: block;
            }

            /* Show bottom nav on mobile */
            .bottom-nav {
                display: flex;
                padding: 8px 12px;
                height: 70px;
            }

            .bottom-nav .bottom-item {
                padding: 8px 12px;
                font-size: 11px;
            }

            .bottom-nav .bottom-item i {
                font-size: 18px;
            }

            .container {
                margin-left: 0;
                margin-top: 64px;
                padding: 16px;
                padding-bottom: 90px;
            }

            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            #sidebar.mobile-open {
                transform: translateX(0);
            }

            .topbar {
                left: 0;
                padding: 12px 16px 12px 60px;
            }

            .dashboard-card {
                padding: 16px;
            }

            /* Stack the incident card inner row on small screens */
            .dashboard-card > div[style*="display: flex"] {
                flex-direction: column !important;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
                padding-bottom: 90px;
            }

            .dashboard-card {
                padding: 12px;
            }

            .status-badge {
                font-size: 11px;
                padding: 4px 10px;
            }

            .bottom-nav {
                height: 65px;
                padding: 6px 4px;
            }

            .bottom-nav .bottom-item {
                font-size: 10px;
                padding: 6px 4px;
            }

            .bottom-nav .bottom-item i {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Responder User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="device.html"><i class="fa fa-tablet"></i> My Device</a>
        <a href="active-incidents.html"><i class="fa fa-exclamation-circle"></i> Active Incidents</a>
        <a href="create-incident.html"><i class="fa fa-plus-circle"></i> Create Incident</a>
        <a href="transfer-incident.html"><i class="fa fa-exchange"></i> Transfer to Rescuer</a>
        <a href="incident-history.html" class="active"><i class="fa fa-history"></i> Incident History</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <div style="max-width: 900px;">
            <h2 style="color: var(--deep-hospital-blue); margin-bottom: 20px; font-weight: 700; font-size: 1.5rem;">📋 Incident History</h2>

            <div id="incidents-container">
                <!-- Incidents will be populated here -->
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-item">
            <i class="fa fa-gauge"></i>
            <span>Home</span>
        </a>
        <a href="device.html" class="bottom-item">
            <i class="fa fa-tablet"></i>
            <span>Device</span>
        </a>
        <a href="create-incident.html" class="bottom-item">
            <i class="fa fa-plus-circle"></i>
            <span>Incident</span>
        </a>
        <a href="incident-history.html" class="bottom-item active">
            <i class="fa fa-history"></i>
            <span>History</span>
        </a>
        <a href="#" onclick="logout()" class="bottom-item">
            <i class="fa fa-sign-out"></i>
        </a>
    </nav>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Responder User', role: 'responder', id: 5 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'responder') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        function getStatusClass(status) {
            switch(status) {
                case 'ongoing': return 'status-ongoing';
                case 'transferred': return 'status-transferred';
                case 'completed': return 'status-completed';
                default: return '';
            }
        }

        function renderIncidentHistory() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'responder');
            const container = document.getElementById('incidents-container');
            
            if (incidents.length === 0) {
                container.innerHTML = `
                    <div class="dashboard-card" style="text-align: left; padding: 40px 20px; max-width: 400px; margin: 0 auto;">
                        <div style="width: 60px; height: 60px; background: var(--clinical-white); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                            <i class="fa fa-clipboard-list" style="font-size: 28px; color: var(--system-gray);"></i>
                        </div>
                        <p style="color: var(--system-gray); font-size: 16px; margin-bottom: 16px;">No incident history found</p>
                        <a href="create-incident.html" class="btn-quick-action" style="width: auto; display: inline-block; padding: 12px 24px; font-size: 14px;">
                            <i class="fa fa-plus"></i> Create First Incident
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = incidents.map(incident => {
                const vitals = window.vitalwearDB.getVitalsByIncident(incident.id);
                const lastVital = vitals[vitals.length - 1];
                const statusClass = getStatusClass(incident.status);
                
                return `
                    <div class="dashboard-card" style="margin-bottom: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
                            <div style="flex: 1; min-width: 200px;">
                                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                                    <div style="width: 40px; height: 40px; background: var(--clinical-white); border-radius: var(--radius); display: flex; align-items: center; justify-content: center;">
                                        <i class="fa fa-hashtag" style="color: var(--medical-cyan); font-size: 18px;"></i>
                                    </div>
                                    <div>
                                        <p style="font-size: 18px; font-weight: 700; color: var(--deep-hospital-blue); margin: 0;">Incident #${incident.id}</p>
                                        <span class="status-badge ${statusClass}">${incident.status}</span>
                                    </div>
                                </div>
                                <p style="color: var(--system-gray); font-size: 14px; margin: 6px 0;"><i class="fa fa-user" style="width: 20px; color: var(--medical-cyan);"></i> <strong>Patient:</strong> ${incident.patient_name}</p>
                                <p style="color: var(--system-gray); font-size: 14px; margin: 6px 0;"><i class="fa fa-calendar" style="width: 20px; color: var(--medical-cyan);"></i> <strong>Started:</strong> ${new Date(incident.created_at).toLocaleString()}</p>
                                ${lastVital ? `
                                <p style="color: var(--system-gray); font-size: 14px; margin: 6px 0;"><i class="fa fa-heartbeat" style="width: 20px; color: var(--health-green);"></i> <strong>Last Vitals:</strong> ${new Date(lastVital.recorded_at).toLocaleString()}</p>
                                ` : ''}
                            </div>
                            <div style="text-align: right; min-width: 150px;">
                                ${incident.updated_at && incident.status !== 'ongoing' ? `
                                <p style="color: var(--system-gray); font-size: 13px; margin: 0;"><i class="fa fa-check-circle" style="color: var(--health-green);"></i> Ended</p>
                                <p style="color: var(--deep-hospital-blue); font-size: 14px; font-weight: 600; margin: 4px 0 0 0;">${new Date(incident.updated_at).toLocaleString()}</p>
                                ` : `
                                <p style="color: var(--system-gray); font-size: 13px; margin: 0;"><i class="fa fa-spinner fa-spin" style="color: var(--medical-cyan);"></i> In Progress</p>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            renderIncidentHistory();
        });
    </script>
</body>
</html>
