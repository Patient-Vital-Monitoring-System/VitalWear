<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Incident - VitalWear</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
    /* VitalWear Soft UI Design System */
    :root {
        --deep-hospital-blue: #0A2A55;
        --medical-cyan: #00B6CC;
        --trust-blue: #0A85CC;
        --health-green: #2EDBB3;
        --clinical-white: #F0F4F8;
        --system-gray: #A9B7C6;
        --surface: #ffffff;
        --radius: 12px;
        --radius-lg: 16px;
        --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
        --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
        --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
    }

    body {
        background-color: var(--clinical-white);
        color: var(--deep-hospital-blue);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }

    /* Soft UI Sidebar */
    #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100vh;
        background: var(--surface);
        border-right: 1px solid rgba(169, 183, 198, 0.3);
        box-shadow: var(--shadow);
        z-index: 1000;
        overflow-y: auto;
    }

    .sidebar-logo {
        padding: 24px 20px;
        text-align: center;
        background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
        margin: 12px;
        border-radius: var(--radius);
    }

    .sidebar-logo img {
        width: 60px;
        height: auto;
    }

    #sidebar a {
        color: var(--deep-hospital-blue);
        margin: 6px 12px;
        padding: 12px 16px;
        border-radius: var(--radius);
        transition: all 0.2s ease;
        border: none;
        font-weight: 500;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    #sidebar a:hover {
        background: rgba(0, 182, 204, 0.1);
        color: var(--medical-cyan);
        transform: translateX(4px);
    }

    #sidebar a.active {
        background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
        color: white;
        box-shadow: var(--shadow-sm);
        transform: translateX(4px);
    }

    /* Soft UI Header */
    .topbar {
        position: fixed;
        top: 0;
        left: 280px;
        right: 0;
        background: var(--surface);
        color: var(--deep-hospital-blue);
        border-bottom: 1px solid rgba(169, 183, 198, 0.2);
        box-shadow: var(--shadow-sm);
        padding: 16px 24px;
        font-weight: 600;
        z-index: 999;
        display: flex;
        align-items: center;
    }

    h2, h3, h4 {
        color: var(--deep-hospital-blue);
        font-weight: 700;
    }

    /* Soft UI Cards */
    .card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        border: 1px solid rgba(169, 183, 198, 0.2);
    }

    .dashboard-card {
        background: var(--surface);
        padding: 32px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        border: 1px solid rgba(169, 183, 198, 0.2);
        margin-bottom: 24px;
    }

    /* Soft UI Buttons */
    .btn-primary {
        background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: var(--radius);
        font-weight: 600;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    /* Main Container */
    .container {
        margin-left: 280px;
        margin-top: 72px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
        width: 100%;
    }

    /* Bottom Navigation — hidden on desktop */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid rgba(169, 183, 198, 0.2);
        display: none;
        justify-content: space-around;
        padding: 12px 0;
        z-index: 1000;
    }

    .bottom-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        color: var(--system-gray);
        text-decoration: none;
        font-size: 12px;
        transition: color 0.2s ease;
    }

    .bottom-item:hover { color: var(--medical-cyan); }
    .bottom-item.active { color: var(--medical-cyan); }
    .bottom-item i { font-size: 20px; }

    /* Mobile menu toggle */
    .mobile-menu-toggle {
        display: none;
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 1001;
        background: var(--medical-cyan);
        color: white;
        border: none;
        border-radius: var(--radius);
        padding: 10px;
        cursor: pointer;
        font-size: 18px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {

        .mobile-menu-toggle { display: block; }

        /* Show bottom nav on mobile */
        .bottom-nav {
            display: flex;
            padding: 8px 12px;
            height: 70px;
        }

        .bottom-item { font-size: 11px; padding: 8px 12px; }
        .bottom-item i { font-size: 18px; }

        .container {
            margin-left: 0;
            margin-top: 64px;
            padding: 16px;
            padding-bottom: 90px;
            margin-bottom: 0;
        }

        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        #sidebar.mobile-open { transform: translateX(0); }

        .topbar {
            left: 0;
            padding: 12px 16px 12px 60px;
        }

        .dashboard-card { padding: 20px 16px; margin-bottom: 16px; }

        h2 { font-size: 1.5rem; }
    }

    @media (max-width: 480px) {
        .container { padding: 12px; padding-bottom: 90px; }
        .dashboard-card { padding: 16px 12px; }

        h2 { font-size: 1.3rem; }

        .topbar { padding: 10px 12px 10px 56px; }

        .bottom-nav { padding: 6px 4px; height: 65px; }
        .bottom-item { font-size: 10px; padding: 6px 4px; }
        .bottom-item i { font-size: 16px; }
    }

    @media (max-width: 360px) {
        .container { padding: 8px; padding-bottom: 90px; }
        .dashboard-card { padding: 12px 8px; }
        h2 { font-size: 1.2rem; }
        .mobile-menu-toggle { padding: 8px; font-size: 16px; }
    }
    </style>
</head>
<body>

<button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
    <i class="fa fa-bars"></i>
</button>

<header class="topbar">
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="responder-name">Responder</span>
        </div>
    </div>
</header>

<nav id="sidebar">
    <div class="sidebar-logo">
        <img src="../../assets/logo.png" alt="VitalWear Logo">
    </div>
    <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
    <a href="device.html"><i class="fa fa-tablet"></i> My Device</a>
    <a href="active-incidents.html"><i class="fa fa-exclamation-circle"></i> Active Incidents</a>
    <a href="create-incident-simple.html" class="active"><i class="fa fa-plus-circle"></i> Create Incident</a>
    <a href="transfer-incident.html"><i class="fa fa-exchange"></i> Transfer to Rescuer</a>
    <a href="incident-history.html"><i class="fa fa-history"></i> Incident History</a>
    <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
</nav>

<main class="container">
    <div style="width: 100%; max-width: 500px;">

        <h2 style="color: var(--deep-hospital-blue); margin-bottom: 24px; font-weight: 700; font-size: 1.75rem; text-align: center;">➕ Create Incident</h2>

        <div id="message" style="background: rgba(46, 219, 179, 0.15); color: var(--health-green); padding: 16px 24px; border-radius: var(--radius); margin-bottom: 24px; text-align: center; font-weight: 600; border: 1px solid rgba(46, 219, 179, 0.3); display: none; align-items: center; justify-content: center; gap: 10px;">
            <i class="fa fa-check-circle"></i>
            <span id="message-text"></span>
        </div>

        <div class="dashboard-card" style="width: 100%;">
            <form id="incident-form">
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--deep-hospital-blue); font-size: 14px;">
                        <i class="fa fa-user" style="color: var(--medical-cyan); margin-right: 8px;"></i>Patient Name *
                    </label>
                    <input type="text" name="pat_name" required style="width: 100%; padding: 14px; border: 2px solid rgba(169, 183, 198, 0.3); border-radius: var(--radius); font-size: 15px; transition: all 0.2s ease;" onfocus="this.style.borderColor='var(--medical-cyan)'; this.style.boxShadow='0 0 0 3px rgba(0, 182, 204, 0.1)';" onblur="this.style.borderColor='rgba(169, 183, 198, 0.3)'; this.style.boxShadow='none';">
                </div>
                
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--deep-hospital-blue); font-size: 14px;">
                        <i class="fa fa-phone" style="color: var(--medical-cyan); margin-right: 8px;"></i>Contact Number
                    </label>
                    <input type="text" name="pat_contact" style="width: 100%; padding: 14px; border: 2px solid rgba(169, 183, 198, 0.3); border-radius: var(--radius); font-size: 15px; transition: all 0.2s ease;" onfocus="this.style.borderColor='var(--medical-cyan)'; this.style.boxShadow='0 0 0 3px rgba(0, 182, 204, 0.1)';" onblur="this.style.borderColor='rgba(169, 183, 198, 0.3)'; this.style.boxShadow='none';">
                </div>
                
                <button type="submit" style="width: 100%; padding: 16px 24px; background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%); color: white; border: none; border-radius: var(--radius-lg); font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: var(--shadow); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px;" onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='var(--shadow)'">
                    <i class="fa fa-plus-circle" style="font-size: 20px;"></i> Create Incident & Record Vitals
                </button>
            </form>
        </div>

    </div>
</main>

<nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-item"><i class="fa fa-gauge"></i><span>Home</span></a>
    <a href="device.html" class="bottom-item"><i class="fa fa-tablet"></i><span>Device</span></a>
    <a href="create-incident-simple.html" class="bottom-item active"><i class="fa fa-plus-circle"></i><span>Incident</span></a>
    <a href="incident-history.html" class="bottom-item"><i class="fa fa-history"></i><span>History</span></a>
    <a href="#" onclick="logout()" class="bottom-item"><i class="fa fa-sign-out"></i></a>
</nav>

<script src="../js/database.js"></script>
<script>
function getCurrentUser() {
    const role = sessionStorage.getItem('current_role');
    return window.vitalwearDB.getUsers(role)[0] || { name: 'Responder User', role: 'responder', id: 5 };
}

function checkAuth() {
    const role = sessionStorage.getItem('current_role');
    if (role !== 'responder') {
        window.location.href = '../index.html';
        return;
    }
}

function logout() {
    sessionStorage.clear();
    window.location.href = '../index.html';
}

function toggleMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('mobile-open');
}

function showMessage(text, type = 'success') {
    const messageDiv = document.getElementById('message');
    const messageText = document.getElementById('message-text');
    
    messageText.textContent = text;
    messageDiv.style.display = 'flex';
    
    if (type === 'error') {
        messageDiv.style.background = 'rgba(239, 68, 68, 0.15)';
        messageDiv.style.color = '#dc2626';
        messageDiv.style.borderColor = 'rgba(239, 68, 68, 0.3)';
    } else {
        messageDiv.style.background = 'rgba(46, 219, 179, 0.15)';
        messageDiv.style.color = 'var(--health-green)';
        messageDiv.style.borderColor = 'rgba(46, 219, 179, 0.3)';
    }
    
    setTimeout(() => {
        messageDiv.style.display = 'none';
    }, 5000);
}

function createIncident(event) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const patientName = formData.get('pat_name');
    const patientContact = formData.get('pat_contact');
    
    if (!patientName || patientName.trim() === '') {
        showMessage('Patient name is required', 'error');
        return;
    }
    
    const user = getCurrentUser();
    
    const incidentData = {
        patient_name: patientName.trim(),
        patient_contact: patientContact ? patientContact.trim() : '',
        patient_age: 0,
        patient_condition: 'Emergency incident',
        incident_location: 'Unknown',
        incident_type: 'emergency',
        incident_severity: 'unknown',
        responder_id: user.id,
        created_at: new Date().toISOString(),
        status: 'ongoing'
    };
    
    console.log('Creating incident:', incidentData);
    
    const newIncident = window.vitalwearDB.createIncident(incidentData);
    
    if (newIncident && newIncident.id) {
        const vitalData = {
            incident_id: newIncident.id,
            heart_rate: 0,
            bp_systolic: 0,
            bp_diastolic: 0,
            oxygen_level: 0,
            recorded_at: new Date().toISOString()
        };
        
        const newVital = window.vitalwearDB.addVital(vitalData);
        
        window.vitalwearDB.logActivity(user.name, 'responder', `Created incident #${newIncident.id} for ${patientName}`);
        
        showMessage('Incident created successfully! Redirecting to vitals...', 'success');
        
        setTimeout(() => {
            window.location.href = `patient-vitals.html?incident_id=${newIncident.id}`;
        }, 2000);
    } else {
        showMessage('Failed to create incident', 'error');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    checkAuth();
    
    const user = getCurrentUser();
    document.getElementById('responder-name').textContent = user.name;
    
    document.getElementById('incident-form').addEventListener('submit', createIncident);
});

// Close sidebar when clicking outside on mobile
document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    if (window.innerWidth <= 768 &&
        !sidebar.contains(event.target) &&
        !menuToggle.contains(event.target) &&
        sidebar.classList.contains('mobile-open')) {
        sidebar.classList.remove('mobile-open');
    }
});
</script>

</body>
</html>
