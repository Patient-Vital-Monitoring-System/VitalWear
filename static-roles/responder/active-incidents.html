<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Incidents - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* VitalWear Branding Color Palette with Soft UI */
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Soft UI Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px;
            border-radius: var(--radius);
        }

        .sidebar-logo i {
            font-size: 48px;
            color: white;
        }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: rgba(0, 182, 204, 0.1);
            color: var(--medical-cyan);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        /* Soft UI Header */
        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--deep-hospital-blue);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Soft UI Cards */
        .incident-card {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            margin: 16px 0;
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
            overflow: visible;
        }

        .vital-card {
            background: var(--clinical-white);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .vital-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .vital-value {
            font-size: 20px;
            font-weight: 700;
            margin: 8px 0;
            color: var(--deep-hospital-blue);
        }

        /* Soft UI Buttons */
        .btn-start {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: inline-block;
            white-space: nowrap;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Soft UI Chart */
        .chart-container {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            margin: 24px 0;
            box-shadow: var(--shadow);
            min-height: 380px;
            border: 1px solid rgba(169, 183, 198, 0.2);
        }

        .chart-container canvas {
            width: 100% !important;
            height: 280px !important;
        }

        .chart-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .chart-tab {
            padding: 10px 20px;
            background: var(--clinical-white);
            border: 1px solid rgba(169, 183, 198, 0.3);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--deep-hospital-blue);
            font-weight: 500;
        }

        .chart-tab:hover {
            background: rgba(0, 182, 204, 0.1);
            border-color: var(--medical-cyan);
        }

        .chart-tab.active {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-sm);
        }

        h2, h3, h4 {
            color: var(--deep-hospital-blue);
            font-weight: 700;
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
        }

        h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-ongoing {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        /* Message styling */
        #message {
            border-radius: var(--radius);
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: 0 -4px 20px rgba(10, 42, 85, 0.08);
            padding: 12px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 998;
        }

        .bottom-nav .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius);
            color: var(--system-gray);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 12px;
        }

        .bottom-nav .bottom-item i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .bottom-nav .bottom-item:hover {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.1);
            transform: translateY(-2px);
        }

        .bottom-nav .bottom-item.active {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.15);
        }

        .bottom-nav .bottom-item.active i {
            transform: scale(1.1);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .topbar {
                left: 0;
                padding: 12px 16px;
            }
            
            .container {
                margin-left: 0;
                margin-top: 60px;
                padding: 16px;
            }
            
            .incident-card {
                padding: 20px 16px;
            }
            
            .vital-card {
                padding: 16px 12px;
            }
            
            .vital-value {
                font-size: 18px;
            }
            
            .chart-container {
                padding: 16px;
                min-height: 300px;
            }
            
            .chart-tabs {
                gap: 8px;
            }
            
            .chart-tab {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .bottom-nav {
                padding: 8px 12px;
            }
            
            .bottom-nav .bottom-item {
                padding: 8px 12px;
                font-size: 11px;
            }
            
            .bottom-nav .bottom-item i {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .vital-card {
                padding: 12px 8px;
            }
            
            .vital-value {
                font-size: 16px;
            }
            
            .chart-container {
                min-height: 250px;
            }
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--medical-cyan);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Responder User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="device.html"><i class="fa fa-tablet"></i> My Device</a>
        <a href="active-incidents.html" class="active"><i class="fa fa-exclamation-circle"></i> Active Incidents</a>
        <a href="create-incident.html"><i class="fa fa-plus-circle"></i> Create Incident</a>
        <a href="transfer-incident.html"><i class="fa fa-exchange"></i> Transfer to Rescuer</a>
        <a href="incident-history.html"><i class="fa fa-history"></i> Incident History</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <h2 style="color: var(--deep-hospital-blue); margin-bottom: 24px; font-weight: 700; font-size: 1.75rem;">🚨 Active Incidents</h2>

        <!-- AJAX Message Container -->
        <div id="message" style="display:none;padding:10px;border-radius:5px;margin:10px 0;"></div>

        <div id="incidents-container">
            <!-- Incidents will be populated here -->
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-item">
            <i class="fa fa-gauge"></i>
            <span>Home</span>
        </a>
        <a href="device.html" class="bottom-item">
            <i class="fa fa-tablet"></i>
            <span>Device</span>
        </a>
        <a href="create-incident.html" class="bottom-item">
            <i class="fa fa-plus-circle"></i>
            <span>Incident</span>
        </a>
        <a href="incident-history.html" class="bottom-item">
            <i class="fa fa-history"></i>
            <span>History</span>
        </a>
        <a href="#" onclick="logout()" class="bottom-item">
            <i class="fa fa-sign-out"></i>
        </a>
    </nav>

    <script src="../js/database.js"></script>
    <script>
        let monitoringIntervals = {};
        let charts = {};
        let chartData = {};

        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Responder User', role: 'responder', id: 5 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'responder') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            msgDiv.innerHTML = text;
            msgDiv.style.background = type === 'success' ? '#d4edda' : '#f8d7da';
            msgDiv.style.color = type === 'success' ? '#155724' : '#721c24';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        function toggleMonitoring(incidentId) {
            const btn = document.getElementById('btn-' + incidentId);
            
            if (monitoringIntervals[incidentId]) {
                // Stop monitoring
                clearInterval(monitoringIntervals[incidentId]);
                delete monitoringIntervals[incidentId];
                btn.innerHTML = '<i class="fa fa-play"></i> Start Live Monitoring';
                btn.className = 'btn-start';
                showMessage('Live monitoring stopped', 'success');
            } else {
                // Start monitoring
                btn.innerHTML = '<i class="fa fa-stop"></i> Stop Monitoring';
                btn.className = 'btn-stop';
                showMessage('Live monitoring started', 'success');
                
                // Record immediately
                recordVitals(incidentId);
                
                // Then record every 5 seconds
                monitoringIntervals[incidentId] = setInterval(() => recordVitals(incidentId), 5000);
            }
        }

        function initializeChart(incidentId) {
            console.log('Initializing chart for incident:', incidentId);
            
            const canvas = document.getElementById('chart-' + incidentId);
            if (!canvas) {
                console.error('Canvas not found for incident:', incidentId);
                return;
            }
            
            const ctx = canvas.getContext('2d');
            if (!ctx) {
                console.error('Could not get context for incident:', incidentId);
                return;
            }
            
            // Initialize data structure with sample data for testing
            if (!chartData[incidentId]) {
                chartData[incidentId] = {
                    labels: ['12:00:00', '12:00:05', '12:00:10'],
                    heartRate: [72, 75, 73],
                    bpSystolic: [120, 122, 118],
                    bpDiastolic: [80, 82, 78],
                    oxygenLevel: [98, 97, 98]
                };
            }
            
            try {
                charts[incidentId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartData[incidentId].labels,
                        datasets: [
                            {
                                label: 'Heart Rate',
                                data: chartData[incidentId].heartRate,
                                borderColor: '#0A85CC',
                                backgroundColor: 'rgba(10, 133, 204, 0.1)',
                                tension: 0.4,
                                yAxisID: 'y',
                                borderWidth: 2
                            },
                            {
                                label: 'Systolic BP',
                                data: chartData[incidentId].bpSystolic,
                                borderColor: '#00B6CC',
                                backgroundColor: 'rgba(0, 182, 204, 0.1)',
                                tension: 0.4,
                                yAxisID: 'y1',
                                borderWidth: 2
                            },
                            {
                                label: 'Diastolic BP',
                                data: chartData[incidentId].bpDiastolic,
                                borderColor: '#2EDBB3',
                                backgroundColor: 'rgba(46, 219, 179, 0.1)',
                                tension: 0.4,
                                yAxisID: 'y1',
                                borderWidth: 2
                            },
                            {
                                label: 'Oxygen Level',
                                data: chartData[incidentId].oxygenLevel,
                                borderColor: '#0A2A55',
                                backgroundColor: 'rgba(10, 42, 85, 0.1)',
                                tension: 0.4,
                                yAxisID: 'y2',
                                borderWidth: 2
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top'
                            }
                        },
                        scales: {
                            x: {
                                display: true,
                                title: {
                                    display: true,
                                    text: 'Time'
                                }
                            },
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                title: {
                                    display: true,
                                    text: 'Heart Rate (bpm)'
                                },
                                min: 50,
                                max: 120
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                title: {
                                    display: true,
                                    text: 'Blood Pressure (mmHg)'
                                },
                                min: 50,
                                max: 180,
                                grid: {
                                    drawOnChartArea: false,
                                }
                            }
                        }
                    }
                });
                console.log('Chart successfully created for incident:', incidentId);
            } catch (error) {
                console.error('Error creating chart for incident:', incidentId, error);
            }
        }

        function switchChart(incidentId, type, tabElement) {
            // Update tab styles
            const container = tabElement.parentElement;
            const tabs = container.querySelectorAll('.chart-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            tabElement.classList.add('active');
            
            // Update chart datasets visibility
            const chart = charts[incidentId];
            if (!chart) return;
            
            chart.data.datasets.forEach((dataset, index) => {
                switch(type) {
                    case 'heartRate':
                        dataset.hidden = index !== 0;
                        break;
                    case 'bloodPressure':
                        dataset.hidden = index !== 1 && index !== 2;
                        break;
                    case 'oxygen':
                        dataset.hidden = index !== 3;
                        break;
                    default: // all
                        dataset.hidden = false;
                }
            });
            
            chart.update();
        }

        function updateChart(incidentId, heartRate, bpSystolic, bpDiastolic, oxygenLevel) {
            if (!chartData[incidentId]) {
                chartData[incidentId] = {
                    labels: [],
                    heartRate: [],
                    bpSystolic: [],
                    bpDiastolic: [],
                    oxygenLevel: []
                };
            }
            
            const time = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
            
            // Add new data
            chartData[incidentId].labels.push(time);
            chartData[incidentId].heartRate.push(heartRate);
            chartData[incidentId].bpSystolic.push(bpSystolic);
            chartData[incidentId].bpDiastolic.push(bpDiastolic);
            chartData[incidentId].oxygenLevel.push(oxygenLevel);
            
            // Keep only last 20 data points
            if (chartData[incidentId].labels.length > 20) {
                chartData[incidentId].labels.shift();
                chartData[incidentId].heartRate.shift();
                chartData[incidentId].bpSystolic.shift();
                chartData[incidentId].bpDiastolic.shift();
                chartData[incidentId].oxygenLevel.shift();
            }
            
            // Update chart
            if (charts[incidentId]) {
                charts[incidentId].data.labels = chartData[incidentId].labels;
                charts[incidentId].data.datasets[0].data = chartData[incidentId].heartRate;
                charts[incidentId].data.datasets[1].data = chartData[incidentId].bpSystolic;
                charts[incidentId].data.datasets[2].data = chartData[incidentId].bpDiastolic;
                charts[incidentId].data.datasets[3].data = chartData[incidentId].oxygenLevel;
                charts[incidentId].update('none'); // Update without animation for smooth real-time updates
            }
        }

        function recordVitals(incidentId) {
            // Generate realistic vital values
            const heartRate = Math.floor(Math.random() * (100 - 60 + 1)) + 60;
            const bpSystolic = Math.floor(Math.random() * (140 - 100 + 1)) + 100;
            const bpDiastolic = Math.floor(Math.random() * (90 - 60 + 1)) + 60;
            const oxygenLevel = Math.floor(Math.random() * (100 - 95 + 1)) + 95;
            
            // Simulate database call
            const vitalData = {
                incident_id: incidentId,
                heart_rate: heartRate,
                bp_systolic: bpSystolic,
                bp_diastolic: bpDiastolic,
                oxygen_level: oxygenLevel
            };
            
            // Add to local storage database
            const newVital = window.vitalwearDB.addVital(vitalData);
            
            if (newVital) {
                // Update display immediately
                document.getElementById('hr-' + incidentId).textContent = heartRate + ' bpm';
                document.getElementById('bp-' + incidentId).textContent = bpSystolic + '/' + bpDiastolic;
                document.getElementById('o2-' + incidentId).textContent = oxygenLevel + '%';
                document.getElementById('time-' + incidentId).textContent = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});
                
                // Update chart
                updateChart(incidentId, heartRate, bpSystolic, bpDiastolic, oxygenLevel);
                
                // Show success message
                showSuccessMessage('Vitals recorded successfully!');
            } else {
                showMessage('Failed to record vitals', 'error');
            }
        }

        function showSuccessMessage(message) {
            // Create success message element
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            // Remove after 2 seconds
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 2000);
        }

        function renderIncidents() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'responder');
            const activeIncidents = incidents.filter(i => i.status === 'ongoing');
            const container = document.getElementById('incidents-container');
            
            if (activeIncidents.length === 0) {
                container.innerHTML = `
                    <div class="incident-card" style="text-align: center; padding: 48px 24px;">
                        <div style="width: 80px; height: 80px; background: var(--clinical-white); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                            <i class="fa fa-clipboard-check" style="font-size: 36px; color: var(--system-gray);"></i>
                        </div>
                        <p style="color: var(--system-gray); font-size: 18px; margin-bottom: 20px;">No active incidents</p>
                        <a href="create-incident.html" class="btn-start" style="width: auto; display: inline-block;">
                            <i class="fa fa-plus"></i> Create Incident
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = activeIncidents.map(incident => createIncidentCard(incident)).join('');
            
            // Initialize charts for each incident
            setTimeout(() => {
                activeIncidents.forEach(incident => {
                    initializeChart(incident.id);
                });
            }, 100);
        }

        function createIncidentCard(incident) {
            const vitals = window.vitalwearDB.getVitalsByIncident(incident.id);
            const latestVital = vitals[vitals.length - 1];
            
            return `
                <div class="incident-card">
                    <div style="margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(169, 183, 198, 0.2);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <h3 style="margin: 0; font-size: 1.25rem;">Incident #${incident.id}</h3>
                            <span class="status-badge status-ongoing">${incident.status}</span>
                        </div>
                        <p style="color: var(--system-gray); font-size: 14px; margin: 4px 0;"><i class="fa fa-user" style="width: 20px; color: var(--medical-cyan);"></i> <strong>Patient:</strong> ${incident.patient_name}</p>
                        <p style="color: var(--system-gray); font-size: 14px; margin: 4px 0;"><i class="fa fa-clock" style="width: 20px; color: var(--medical-cyan);"></i> <strong>Started:</strong> ${new Date(incident.created_at).toLocaleString()}</p>
                    </div>
                    
                    <div style="text-align:center;margin-bottom:20px;">
                        <button id="btn-${incident.id}" class="btn-start" onclick="toggleMonitoring(${incident.id})" style="white-space:nowrap;overflow:visible;">
                            <i class="fa fa-play"></i> Start Live Monitoring
                        </button>
                    </div>
                    
                    <div id="vitals-${incident.id}">
                        <h4 style="color: var(--deep-hospital-blue); margin-bottom: 16px; font-size: 1.1rem;"><i class="fa fa-heartbeat" style="color: var(--medical-cyan);"></i> Vitals Monitor</h4>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
                            <div class="vital-card">
                                <div style="color: var(--system-gray); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Heart Rate</div>
                                <div class="vital-value" id="hr-${incident.id}" style="color: #0A85CC;">
                                    ${latestVital ? latestVital.heart_rate : '--'}<span style="font-size: 14px; color: var(--system-gray);"> bpm</span>
                                </div>
                            </div>
                            <div class="vital-card">
                                <div style="color: var(--system-gray); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Blood Pressure</div>
                                <div class="vital-value" id="bp-${incident.id}" style="color: #00B6CC; font-size: 18px;">
                                    ${latestVital ? latestVital.bp_systolic + '/' + latestVital.bp_diastolic : '--/--'}
                                </div>
                            </div>
                            <div class="vital-card">
                                <div style="color: var(--system-gray); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Oxygen Level</div>
                                <div class="vital-value" id="o2-${incident.id}" style="color: #0A2A55;">
                                    ${latestVital ? latestVital.oxygen_level + '%' : '--%'}
                                </div>
                            </div>
                            <div class="vital-card">
                                <div style="color: var(--system-gray); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Last Update</div>
                                <div class="vital-value" id="time-${incident.id}" style="color: #2EDBB3; font-size: 16px;">
                                    ${latestVital ? new Date(latestVital.recorded_at).toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'}) : '--:--'}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Vitals Chart -->
                    <div class="chart-container">
                        <h4 style="margin-bottom: 15px;">📈 Vitals Trend</h4>
                        <div class="chart-tabs">
                            <div class="chart-tab active" onclick="switchChart(${incident.id}, 'all', this)">All Vitals</div>
                            <div class="chart-tab" onclick="switchChart(${incident.id}, 'heartRate', this)">Heart Rate</div>
                            <div class="chart-tab" onclick="switchChart(${incident.id}, 'bloodPressure', this)">Blood Pressure</div>
                            <div class="chart-tab" onclick="switchChart(${incident.id}, 'oxygen', this)">Oxygen Level</div>
                        </div>
                        <div style="border: 2px solid #e9ecef; border-radius: 8px; padding: 10px; background: #f8f9fa;">
                            <canvas id="chart-${incident.id}" style="background: white;"></canvas>
                        </div>
                    </div>
                </div>
            `;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            // Check if Chart.js is loaded
            if (typeof Chart === 'undefined') {
                console.error('Chart.js is not loaded!');
                return;
            } else {
                console.log('Chart.js is loaded successfully');
            }
            
            renderIncidents();
        });
    </script>
</body>
</html>
