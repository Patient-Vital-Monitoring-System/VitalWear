<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Vitals - VitalWear</title>
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
    /* VitalWear Soft UI Design System */
    :root {
        --deep-hospital-blue: #0A2A55;
        --medical-cyan: #00B6CC;
        --trust-blue: #0A85CC;
        --health-green: #2EDBB3;
        --clinical-white: #F0F4F8;
        --system-gray: #A9B7C6;
        --surface: #ffffff;
        --radius: 12px;
        --radius-lg: 16px;
        --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
        --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
        --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
    }

    body {
        background-color: var(--clinical-white);
        color: var(--deep-hospital-blue);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }

    /* Soft UI Sidebar */
    #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100vh;
        background: var(--surface);
        border-right: 1px solid rgba(169, 183, 198, 0.3);
        box-shadow: var(--shadow);
        z-index: 1000;
        overflow-y: auto;
    }

    .sidebar-logo {
        padding: 24px 20px;
        text-align: center;
        background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
        margin: 12px;
        border-radius: var(--radius);
    }

    .sidebar-logo img {
        width: 60px;
        height: auto;
    }

    #sidebar a {
        color: var(--deep-hospital-blue);
        margin: 6px 12px;
        padding: 12px 16px;
        border-radius: var(--radius);
        transition: all 0.2s ease;
        border: none;
        font-weight: 500;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    #sidebar a:hover {
        background: rgba(0, 182, 204, 0.1);
        color: var(--medical-cyan);
        transform: translateX(4px);
    }

    #sidebar a.active {
        background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
        color: white;
        box-shadow: var(--shadow-sm);
        transform: translateX(4px);
    }

    /* Soft UI Header */
    .topbar {
        background: var(--surface);
        color: var(--deep-hospital-blue);
        border-bottom: 1px solid rgba(169, 183, 198, 0.2);
        box-shadow: var(--shadow-sm);
        padding: 16px 24px;
        font-weight: 600;
    }

    h2, h3, h4 {
        color: var(--deep-hospital-blue);
        font-weight: 700;
    }

    /* Soft UI Cards */
    .card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        border: 1px solid rgba(169, 183, 198, 0.2);
    }

    .dashboard-card {
        background: var(--surface);
        padding: 32px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        border: 1px solid rgba(169, 183, 198, 0.2);
        margin-bottom: 24px;
    }

    /* Soft UI Buttons */
    .btn-primary {
        background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: var(--radius);
        font-weight: 600;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

    .btn-secondary {
        background: var(--system-gray);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: var(--radius);
        font-weight: 600;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
    }

    .btn-secondary:hover {
        background: #8B98A8;
        transform: translateY(-2px);
    }

    /* Main Container */
    .container {
        margin-left: 280px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
        width: 100%;
    }

    /* Vitals Grid */
    .vitals-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
    }

    .vital-item {
        background: rgba(0, 182, 204, 0.05);
        padding: 20px;
        border-radius: var(--radius);
        border: 2px solid rgba(0, 182, 204, 0.2);
        text-align: center;
        transition: all 0.3s ease;
    }

    .vital-item:hover {
        background: rgba(0, 182, 204, 0.1);
        transform: translateY(-2px);
    }

    .vital-value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--medical-cyan);
        margin-bottom: 8px;
    }

    .vital-label {
        font-size: 0.9rem;
        color: var(--system-gray);
        font-weight: 500;
    }

    .vital-input {
        margin-bottom: 16px;
    }

    .vital-input label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--deep-hospital-blue);
        font-size: 14px;
    }

    .vital-input input {
        width: 100%;
        padding: 12px;
        border: 2px solid rgba(169, 183, 198, 0.3);
        border-radius: var(--radius);
        font-size: 16px;
        transition: all 0.2s ease;
    }

    .vital-input input:focus {
        outline: none;
        border-color: var(--medical-cyan);
        box-shadow: 0 0 0 3px rgba(0, 182, 204, 0.1);
    }

    /* Bottom Navigation */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid rgba(169, 183, 198, 0.2);
        display: flex;
        justify-content: space-around;
        padding: 12px 0;
        z-index: 1000;
    }

    .bottom-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        color: var(--system-gray);
        text-decoration: none;
        font-size: 12px;
        transition: color 0.2s ease;
    }

    .bottom-item:hover {
        color: var(--medical-cyan);
    }

    .bottom-item.active {
        color: var(--medical-cyan);
    }

    .bottom-item i {
        font-size: 20px;
    }

    /* Message */
    .message {
        padding: 16px 20px;
        border-radius: var(--radius);
        margin-bottom: 24px;
        display: none;
    }

    .message.success {
        background: rgba(16, 185, 129, 0.1);
        color: var(--health-green);
        border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .message.error {
        background: rgba(239, 68, 68, 0.1);
        color: #EF4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .container {
            margin-left: 0;
            padding: 16px;
            margin-bottom: 60px;
        }
        
        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        
        #sidebar.mobile-open {
            transform: translateX(0);
        }
        
        .topbar {
            left: 0;
        }

        .vitals-grid {
            grid-template-columns: 1fr;
        }
    }

    /* Mobile menu toggle */
    .mobile-menu-toggle {
        display: none;
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 1001;
        background: var(--medical-cyan);
        color: white;
        border: none;
        border-radius: var(--radius);
        padding: 10px;
        cursor: pointer;
        font-size: 18px;
    }

    @media (max-width: 768px) {
        .mobile-menu-toggle {
            display: block;
        }
    }
    </style>
</head>
<body>

<header class="topbar">
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="responder-name">Responder</span>
        </div>
    </div>
</header>

<nav id="sidebar">
<div class="sidebar-logo">
    <img src="../../assets/logo.png" alt="VitalWear Logo">
</div>
<a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
<a href="device.html"><i class="fa fa-tablet"></i> My Device</a>
<a href="active-incidents.html"><i class="fa fa-exclamation-circle"></i> Active Incidents</a>
<a href="create-incident-simple.html"><i class="fa fa-plus-circle"></i> Create Incident</a>
<a href="transfer-incident.html"><i class="fa fa-exchange"></i> Transfer to Rescuer</a>
<a href="incident-history.html"><i class="fa fa-history"></i> Incident History</a>
<a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
</nav>

<main class="container">
<div style="width: 100%; max-width: 800px;">

<div id="message" class="message"></div>

<div class="dashboard-card">
    <h2 style="text-align: center; margin-bottom: 32px; font-size: 1.75rem;">
        <i class="fa fa-heart-pulse" style="color: var(--medical-cyan); margin-right: 12px;"></i>
        Patient Vitals - <span id="patient-name">Loading...</span>
    </h2>

    <!-- Current Vitals Display -->
    <div class="vitals-grid" id="current-vitals">
        <div class="vital-item">
            <div class="vital-value" id="heart-rate-display">--</div>
            <div class="vital-label">Heart Rate (bpm)</div>
        </div>
        <div class="vital-item">
            <div class="vital-value" id="bp-display">--/--</div>
            <div class="vital-label">Blood Pressure (mmHg)</div>
        </div>
        <div class="vital-item">
            <div class="vital-value" id="oxygen-display">--</div>
            <div class="vital-label">Oxygen Level (%)</div>
        </div>
        <div class="vital-item">
            <div class="vital-value" id="temp-display">--</div>
            <div class="vital-label">Temperature (°F)</div>
        </div>
    </div>

    <!-- Vitals Input Form -->
    <form id="vitals-form">
        <h3 style="margin-bottom: 24px; color: var(--deep-hospital-blue);">
            <i class="fa fa-edit" style="color: var(--medical-cyan); margin-right: 8px;"></i>
            Update Vitals
        </h3>

        <div class="vitals-grid">
            <div class="vital-input">
                <label for="heart-rate">
                    <i class="fa fa-heart-pulse" style="color: var(--medical-cyan); margin-right: 8px;"></i>
                    Heart Rate
                </label>
                <input type="number" id="heart-rate" name="heart_rate" min="0" max="300" placeholder="72">
            </div>
            <div class="vital-input">
                <label for="bp-systolic">
                    <i class="fa fa-tachometer" style="color: var(--medical-cyan); margin-right: 8px;"></i>
                    BP Systolic
                </label>
                <input type="number" id="bp-systolic" name="bp_systolic" min="0" max="300" placeholder="120">
            </div>
            <div class="vital-input">
                <label for="bp-diastolic">
                    <i class="fa fa-tachometer" style="color: var(--medical-cyan); margin-right: 8px;"></i>
                    BP Diastolic
                </label>
                <input type="number" id="bp-diastolic" name="bp_diastolic" min="0" max="200" placeholder="80">
            </div>
            <div class="vital-input">
                <label for="oxygen-level">
                    <i class="fa fa-lungs" style="color: var(--medical-cyan); margin-right: 8px;"></i>
                    Oxygen Level
                </label>
                <input type="number" id="oxygen-level" name="oxygen_level" min="0" max="100" placeholder="98">
            </div>
            <div class="vital-input">
                <label for="temperature">
                    <i class="fa fa-thermometer" style="color: var(--medical-cyan); margin-right: 8px;"></i>
                    Temperature
                </label>
                <input type="number" id="temperature" name="temperature" min="90" max="110" step="0.1" placeholder="98.6">
            </div>
            <div class="vital-input">
                <label for="respiratory-rate">
                    <i class="fa fa-wind" style="color: var(--medical-cyan); margin-right: 8px;"></i>
                    Respiratory Rate
                </label>
                <input type="number" id="respiratory-rate" name="respiratory_rate" min="0" max="60" placeholder="16">
            </div>
        </div>

        <div style="display: flex; gap: 16px; margin-top: 32px;">
            <button type="submit" class="btn-primary" style="flex: 1;">
                <i class="fa fa-save"></i> Save Vitals
            </button>
            <button type="button" class="btn-secondary" onclick="goToActiveIncidents()" style="flex: 1;">
                <i class="fa fa-list"></i> View Active Incidents
            </button>
        </div>
    </form>
</div>

</div>
</main>

<nav class="bottom-nav">
<a href="dashboard.html" class="bottom-item"><i class="fa fa-gauge"></i><span>Home</span></a>
<a href="device.html" class="bottom-item"><i class="fa fa-tablet"></i><span>Device</span></a>
<a href="active-incidents.html" class="bottom-item"><i class="fa fa-exclamation-circle"></i><span>Incidents</span></a>
<a href="incident-history.html" class="bottom-item"><i class="fa fa-history"></i><span>History</span></a>
<a href="#" onclick="logout()" class="bottom-item"><i class="fa fa-sign-out"></i></a>
</nav>

<script src="../js/database.js"></script>
<script>
let currentIncidentId = null;
let currentIncident = null;

function getCurrentUser() {
    const role = sessionStorage.getItem('current_role');
    return window.vitalwearDB.getUsers(role)[0] || { name: 'Responder User', role: 'responder', id: 5 };
}

function checkAuth() {
    const role = sessionStorage.getItem('current_role');
    if (role !== 'responder') {
        window.location.href = '../index.html';
        return;
    }
}

function logout() {
    sessionStorage.clear();
    window.location.href = '../index.html';
}

function toggleMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('mobile-open');
}

function showMessage(text, type = 'success') {
    const messageDiv = document.getElementById('message');
    
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = 'block';
    
    setTimeout(() => {
        messageDiv.style.display = 'none';
    }, 5000);
}

function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        incident_id: params.get('incident_id')
    };
}

function loadIncident() {
    const params = getUrlParams();
    currentIncidentId = parseInt(params.incident_id);
    
    if (!currentIncidentId) {
        showMessage('No incident ID provided', 'error');
        return;
    }
    
    const incidents = window.vitalwearDB.getIncidents();
    currentIncident = incidents.find(i => i.id === currentIncidentId);
    
    if (!currentIncident) {
        showMessage('Incident not found', 'error');
        return;
    }
    
    // Update patient name
    document.getElementById('patient-name').textContent = currentIncident.patient_name;
    
    // Load current vitals
    loadCurrentVitals();
}

function loadCurrentVitals() {
    if (!currentIncidentId) return;
    
    const vitals = window.vitalwearDB.getVitalsByIncident(currentIncidentId);
    const latestVital = vitals[vitals.length - 1]; // Get most recent
    
    if (latestVital) {
        // Update display
        document.getElementById('heart-rate-display').textContent = latestVital.heart_rate || '--';
        document.getElementById('bp-display').textContent = 
            (latestVital.bp_systolic && latestVital.bp_diastolic) 
                ? `${latestVital.bp_systolic}/${latestVital.bp_diastolic}` 
                : '--/--';
        document.getElementById('oxygen-display').textContent = latestVital.oxygen_level || '--';
        document.getElementById('temp-display').textContent = latestVital.temperature || '--';
        
        // Update form with current values
        document.getElementById('heart-rate').value = latestVital.heart_rate || '';
        document.getElementById('bp-systolic').value = latestVital.bp_systolic || '';
        document.getElementById('bp-diastolic').value = latestVital.bp_diastolic || '';
        document.getElementById('oxygen-level').value = latestVital.oxygen_level || '';
        document.getElementById('temperature').value = latestVital.temperature || '';
        document.getElementById('respiratory-rate').value = latestVital.respiratory_rate || '';
    }
}

function saveVitals(event) {
    event.preventDefault();
    
    if (!currentIncidentId) {
        showMessage('No incident selected', 'error');
        return;
    }
    
    const formData = new FormData(event.target);
    
    const vitalData = {
        incident_id: currentIncidentId,
        heart_rate: parseInt(formData.get('heart_rate')) || 0,
        bp_systolic: parseInt(formData.get('bp_systolic')) || 0,
        bp_diastolic: parseInt(formData.get('bp_diastolic')) || 0,
        oxygen_level: parseInt(formData.get('oxygen_level')) || 0,
        temperature: parseFloat(formData.get('temperature')) || 0,
        respiratory_rate: parseInt(formData.get('respiratory_rate')) || 0,
        recorded_at: new Date().toISOString()
    };
    
    const newVital = window.vitalwearDB.addVital(vitalData);
    
    if (newVital) {
        const user = getCurrentUser();
        window.vitalwearDB.logActivity(user.name, 'responder', `Updated vitals for incident #${currentIncidentId}`);
        
        showMessage('Vitals saved successfully!', 'success');
        loadCurrentVitals(); // Refresh display
    } else {
        showMessage('Failed to save vitals', 'error');
    }
}

function goToActiveIncidents() {
    window.location.href = 'active-incidents.html';
}

// Initialize page
document.addEventListener('DOMContentLoaded', function() {
    checkAuth();
    
    const user = getCurrentUser();
    document.getElementById('responder-name').textContent = user.name;
    
    // Load incident data
    loadIncident();
    
    // Setup form submission
    document.getElementById('vitals-form').addEventListener('submit', saveVitals);
});
</script>

</body>
</html>
