<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-50: #E8F4FD;
            --primary-100: #D1E9FB;
            --primary-200: #A9D9F5;
            --primary-300: #7BC4F0;
            --primary-400: #4DAEEA;
            --primary-500: #2E96D5;
            --primary-600: #1E7AB8;
            --primary-700: #1A5F9A;
            --primary-800: #1A4975;
            --primary-900: #1A3A5C;
            
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;
            
            --primary: var(--primary-600);
            --background: var(--gray-50);
            --surface: #ffffff;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            
            --radius: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            background: linear-gradient(135deg, var(--primary-50) 0%, var(--primary-100) 100%);
        }

        .login-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
            padding: 32px;
            text-align: center;
        }

        .login-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .login-header .logo i {
            font-size: 48px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .login-body {
            padding: 40px 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            transition: all 0.2s ease;
            background: var(--surface);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 122, 184, 0.1);
        }

        .form-group select {
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .demo-accounts {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .demo-accounts h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-account-list {
            display: grid;
            gap: 8px;
        }

        .demo-account {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--gray-50);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .demo-account:hover {
            background: var(--primary-50);
            border-color: var(--primary-200);
            transform: translateX(4px);
        }

        .demo-account-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .demo-account-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .demo-account-details {
            flex: 1;
        }

        .demo-account-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .demo-account-role {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .demo-account-arrow {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            padding: 12px 16px;
            border-radius: var(--radius);
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .login-container {
                padding: 16px;
            }
            
            .login-body {
                padding: 32px 24px;
            }
            
            .login-header {
                padding: 24px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fa fa-heart-pulse"></i>
                    <h1>VitalWear</h1>
                </div>
                <p>Patient Vital Monitoring System</p>
            </div>
            
            <div class="login-body">
                <div class="error-message" id="error-message">
                    Invalid credentials. Please try again.
                </div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Authenticating...</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                            autocomplete="email"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                    
                    <button type="submit" class="btn-login" id="login-btn">
                        <i class="fa fa-sign-in"></i>
                        Sign In
                    </button>
                </form>
                
                <div class="demo-accounts">
                    <h3>Demo Accounts</h3>
                    <div class="demo-account-list" id="demo-accounts">
                        <!-- Demo accounts will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script>
        // Demo credentials for easy testing
        const demoCredentials = {
            'john@vitalwear.com': { password: 'admin123', role: 'management', name: 'John Manager' },
            'sarah@vitalwear.com': { password: 'admin123', role: 'management', name: 'Sarah Admin' },
            'mike@vitalwear.com': { password: 'rescuer123', role: 'rescuer', name: 'Mike Rescuer' },
            'emma@vitalwear.com': { password: 'rescuer123', role: 'rescuer', name: 'Emma Paramedic' },
            'alex@vitalwear.com': { password: 'responder123', role: 'responder', name: 'Alex Responder' },
            'lisa@vitalwear.com': { password: 'responder123', role: 'responder', name: 'Lisa FirstAid' }
        };

        // Check for role pre-selection in URL
        function getRoleFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('role');
        }

        function initializeDemoAccounts() {
            const container = document.getElementById('demo-accounts');
            const users = window.vitalwearDB.getUsers();
            const preSelectedRole = getRoleFromUrl();
            
            const allUsers = [
                ...users.management.map(u => ({ ...u, icon: 'M' })),
                ...users.rescuer.map(u => ({ ...u, icon: 'R' })),
                ...users.responder.map(u => ({ ...u, icon: 'F' }))
            ];
            
            // Filter by pre-selected role if provided
            const filteredUsers = preSelectedRole 
                ? allUsers.filter(u => u.role === preSelectedRole)
                : allUsers;
            
            container.innerHTML = filteredUsers.map(user => `
                <div class="demo-account" onclick="quickLogin('${user.email}', '${demoCredentials[user.email]?.password || 'demo123'}')">
                    <div class="demo-account-info">
                        <div class="demo-account-icon">${user.icon}</div>
                        <div class="demo-account-details">
                            <div class="demo-account-name">${user.name}</div>
                            <div class="demo-account-role">${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</div>
                        </div>
                    </div>
                    <i class="fa fa-arrow-right demo-account-arrow"></i>
                </div>
            `).join('');
            
            // Update page title based on pre-selected role
            if (preSelectedRole) {
                document.querySelector('.login-header h1').textContent = `${preSelectedRole.charAt(0).toUpperCase() + preSelectedRole.slice(1)} Login`;
                document.querySelector('.login-header p').textContent = `Sign in to access your ${preSelectedRole} dashboard`;
            }
        }

        function quickLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            document.getElementById('login-form').dispatchEvent(new Event('submit'));
        }

        function showError(message) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.classList.add('show');
            
            setTimeout(() => {
                errorElement.classList.remove('show');
            }, 5000);
        }

        function showLoading(show) {
            const loadingElement = document.getElementById('loading');
            const loginBtn = document.getElementById('login-btn');
            
            if (show) {
                loadingElement.classList.add('show');
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing In...';
            } else {
                loadingElement.classList.remove('show');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fa fa-sign-in"></i> Sign In';
            }
        }

        function authenticateUser(email, password) {
            // Check demo credentials first
            if (demoCredentials[email] && demoCredentials[email].password === password) {
                const user = demoCredentials[email];
                return {
                    success: true,
                    user: {
                        id: window.vitalwearDB.getUsers(user.role).find(u => u.email === email)?.id || 1,
                        name: user.name,
                        email: email,
                        role: user.role
                    }
                };
            }
            
            // Check database users
            const allUsers = window.vitalwearDB.getUsers();
            for (const [role, users] of Object.entries(allUsers)) {
                const foundUser = users.find(u => u.email === email);
                if (foundUser) {
                    // For demo purposes, accept any password for database users
                    return {
                        success: true,
                        user: {
                            id: foundUser.id,
                            name: foundUser.name,
                            email: foundUser.email,
                            role: foundUser.role
                        }
                    };
                }
            }
            
            return { success: false, error: 'Invalid credentials' };
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            showLoading(true);
            
            // Simulate authentication delay
            setTimeout(() => {
                const authResult = authenticateUser(email, password);
                
                if (authResult.success) {
                    // Store user session
                    sessionStorage.setItem('current_role', authResult.user.role);
                    sessionStorage.setItem('current_user_id', authResult.user.id);
                    sessionStorage.setItem('current_user_name', authResult.user.name);
                    sessionStorage.setItem('current_user_email', authResult.user.email);
                    
                    // Log activity
                    window.vitalwearDB.logActivity(authResult.user.name, authResult.user.role, 'Logged into system');
                    
                    // Redirect to appropriate dashboard
                    window.location.href = `${authResult.user.role}/dashboard.html`;
                } else {
                    showLoading(false);
                    showError(authResult.error || 'Invalid credentials. Please try again.');
                }
            }, 1000);
        }

        // Check if user is already logged in
        function checkExistingSession() {
            const currentRole = sessionStorage.getItem('current_role');
            const currentUserId = sessionStorage.getItem('current_user_id');
            
            if (currentRole && currentUserId) {
                // User is already logged in, redirect to dashboard
                window.location.href = `${currentRole}/dashboard.html`;
                return true;
            }
            return false;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check for existing session
            if (!checkExistingSession()) {
                // Initialize demo accounts
                initializeDemoAccounts();
                
                // Setup form submission
                document.getElementById('login-form').addEventListener('submit', handleLogin);
                
                // Focus on email field
                document.getElementById('email').focus();
            }
        });
    </script>
</body>
</html>
