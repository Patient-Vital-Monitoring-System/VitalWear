<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferred Incidents - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ── Sidebar ── */
        #sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 280px; height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px; text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px; border-radius: var(--radius);
        }

        .sidebar-logo i { font-size: 48px; color: white; }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px; padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            font-weight: 500; text-decoration: none;
            display: flex; align-items: center; gap: 12px;
        }

        #sidebar a:hover { background: rgba(0, 182, 204, 0.1); color: var(--medical-cyan); transform: translateX(4px); }

        #sidebar a.active {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white; box-shadow: var(--shadow-sm);
        }

        /* ── Topbar ── */
        .topbar {
            position: fixed;
            top: 0; left: 280px; right: 0;
            background: var(--surface);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px; font-weight: 600;
            z-index: 999;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* ── Container ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        /* ── Header banner ── */
        .header {
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            color: white; padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .header p { opacity: 0.9; }

        /* ── Incident cards ── */
        .incident-grid { display: grid; gap: 24px; }

        .incident-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .incident-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .incident-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 182, 204, 0.1) 0%, rgba(10, 133, 204, 0.1) 100%);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
        }

        .incident-header h3 { color: var(--deep-hospital-blue); margin: 0 0 8px 0; font-size: 1.2rem; }

        .incident-meta { display: flex; gap: 16px; align-items: center; margin-top: 12px; flex-wrap: wrap; }

        .incident-meta-item { display: flex; align-items: center; gap: 6px; color: var(--system-gray); font-size: 14px; }

        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .status-transferred { background: rgba(0, 182, 204, 0.15); color: var(--medical-cyan); }
        .status-ongoing { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .status-completed { background: rgba(46, 219, 179, 0.15); color: var(--health-green); }

        .incident-body { padding: 24px; }

        .patient-info { margin-bottom: 20px; }
        .patient-info h4 { color: var(--deep-hospital-blue); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { color: var(--system-gray); font-size: 12px; font-weight: 500; text-transform: uppercase; }
        .info-value { color: var(--deep-hospital-blue); font-weight: 600; }

        .vitals-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(169, 183, 198, 0.2); }

        .vitals-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .vitals-header h4 { color: var(--deep-hospital-blue); display: flex; align-items: center; gap: 8px; }

        .vitals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; }

        .vital-stat { text-align: center; padding: 16px; background: rgba(240, 244, 248, 0.5); border-radius: var(--radius); }
        .vital-value { font-size: 1.5rem; font-weight: 700; color: var(--deep-hospital-blue); margin-bottom: 4px; }
        .vital-label { color: var(--system-gray); font-size: 12px; font-weight: 500; }

        .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

        .btn {
            padding: 12px 24px; border: none; border-radius: var(--radius);
            cursor: pointer; font-size: 14px; font-weight: 600;
            transition: all 0.3s ease; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary { background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .btn-success { background: var(--health-green); color: white; }
        .btn-secondary { background: var(--system-gray); color: white; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--system-gray); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; }

        /* ── Mobile menu toggle — hidden on desktop ── */
        .mobile-menu-toggle {
            display: none;
            position: fixed; top: 16px; left: 16px; z-index: 1001;
            background: var(--medical-cyan); color: white;
            border: none; border-radius: var(--radius);
            padding: 10px; cursor: pointer; font-size: 18px;
        }

        /* ── Bottom nav — hidden on desktop ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: 0 -4px 20px rgba(10, 42, 85, 0.08);
            padding: 12px 24px;
            display: none;
            justify-content: space-around; align-items: center;
            z-index: 998;
        }

        .bottom-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            padding: 10px 20px; border-radius: var(--radius);
            color: var(--system-gray); text-decoration: none;
            transition: all 0.3s ease; font-weight: 500; font-size: 12px;
        }

        .bottom-item i { font-size: 20px; transition: all 0.3s ease; }
        .bottom-item:hover { color: var(--medical-cyan); background: rgba(0, 182, 204, 0.1); transform: translateY(-2px); }
        .bottom-item.active { color: var(--medical-cyan); background: rgba(0, 182, 204, 0.15); }
        .bottom-item.active i { transform: scale(1.1); }

        /* ══════════════════════════════
           RESPONSIVE BREAKPOINTS
        ══════════════════════════════ */

        @media (max-width: 1200px) {
            .container { padding: 16px; }
            .header { padding: 32px; }
        }

        @media (max-width: 992px) {
            .container { padding: 12px; }
            .header { padding: 28px; }
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle { display: block; }

            .bottom-nav { display: flex; padding: 8px 12px; height: 70px; }
            .bottom-item { padding: 8px 12px; font-size: 11px; }
            .bottom-item i { font-size: 18px; }

            #sidebar { transform: translateX(-100%); transition: transform 0.3s ease; width: 280px; }
            #sidebar.mobile-open { transform: translateX(0); }

            .topbar { left: 0; padding: 12px 16px 12px 60px; height: auto; min-height: 60px; }
            .topbar div:first-child { font-size: 16px; }
            .topbar div:last-child  { font-size: 14px; }

            .container { margin-left: 0; margin-top: 64px; padding: 16px; padding-bottom: 90px; }

            .header { padding: 24px 20px; }
            .header h1 { font-size: 1.5rem; }

            .incident-header { padding: 16px; }
            .incident-header h3 { font-size: 1.1rem; }
            .incident-meta { flex-direction: column; align-items: flex-start; gap: 8px; }
            .incident-body { padding: 20px 16px; }

            .info-grid { grid-template-columns: 1fr; gap: 12px; }
            .vitals-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .vital-stat { padding: 12px; }
            .vital-value { font-size: 1.2rem; }

            .actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }

        @media (max-width: 480px) {
            .container { padding: 12px; padding-bottom: 90px; }
            .header { padding: 20px 16px; }
            .header h1 { font-size: 1.3rem; }
            .vitals-grid { grid-template-columns: 1fr; }
            .vital-value { font-size: 1.1rem; }
            .topbar { padding: 10px 12px 10px 56px; }
            .topbar div:first-child span { font-size: 14px; }
            .topbar div:last-child  span { font-size: 12px; }
            .bottom-nav { padding: 6px 4px; height: 65px; }
            .bottom-item { font-size: 10px; padding: 6px 4px; }
            .bottom-item i { font-size: 16px; }
        }

        @media (max-width: 360px) {
            .container { padding: 8px; padding-bottom: 90px; }
            .header h1 { font-size: 1.2rem; }
            .topbar div:first-child i    { font-size: 20px; }
            .topbar div:first-child span { font-size: 12px; }
            .mobile-menu-toggle { padding: 8px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Rescuer User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="transferred-incidents.html" class="active"><i class="fa fa-exclamation-circle"></i> Transferred Incidents</a>
        <a href="ongoing-monitoring.html"><i class="fa fa-heart-pulse"></i> Ongoing Monitoring</a>
        <a href="completed-cases.html"><i class="fa fa-check-circle"></i> Completed Cases</a>
        <a href="incident-records.html"><i class="fa fa-folder"></i> Incident Records</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <h1><i class="fa fa-exclamation-circle"></i> Transferred Incidents</h1>
            <p>Incidents transferred from responders requiring your attention</p>
        </header>

        <div class="incident-grid" id="incidents-container">
            <!-- Incidents will be populated here -->
        </div>
    </main>

    <!-- Bottom nav — mobile only -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-item"><i class="fa fa-gauge"></i><span>Home</span></a>
        <a href="transferred-incidents.html" class="bottom-item active"><i class="fa fa-exclamation-circle"></i><span>Transfer</span></a>
        <a href="ongoing-monitoring.html" class="bottom-item"><i class="fa fa-heart-pulse"></i><span>Monitor</span></a>
        <a href="completed-cases.html" class="bottom-item"><i class="fa fa-check-circle"></i><span>Complete</span></a>
        <a href="#" onclick="logout()" class="bottom-item"><i class="fa fa-sign-out"></i><span>Logout</span></a>
    </nav>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Rescuer User', role: 'rescuer', id: 3 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'rescuer') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function renderIncidents() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'rescuer');
            const transferredIncidents = incidents.filter(i => i.status === 'transferred');
            const container = document.getElementById('incidents-container');

            if (transferredIncidents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-exclamation-circle"></i>
                        <h3 style="color: var(--deep-hospital-blue); margin-bottom: 8px;">No Transferred Incidents</h3>
                        <p>No incidents have been transferred to you yet.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = transferredIncidents.map(incident => createIncidentCard(incident)).join('');
        }

        function createIncidentCard(incident) {
            const vitals = window.vitalwearDB.getVitalsByIncident(incident.id);
            const latestVital = vitals[vitals.length - 1];

            return `
                <div class="incident-card">
                    <div class="incident-header">
                        <h3><i class="fa fa-exclamation-circle"></i> Incident #${incident.id}</h3>
                        <div class="incident-meta">
                            <div class="incident-meta-item">
                                <i class="fa fa-user"></i>
                                <span>${incident.patient_name}</span>
                            </div>
                            <div class="incident-meta-item">
                                <i class="fa fa-clock"></i>
                                <span>${new Date(incident.created_at).toLocaleString()}</span>
                            </div>
                            <span class="status-badge status-transferred">Transferred</span>
                        </div>
                    </div>
                    <div class="incident-body">
                        <div class="patient-info">
                            <h4><i class="fa fa-user"></i> Patient Information</h4>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">Name</span>
                                    <span class="info-value">${incident.patient_name}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Age</span>
                                    <span class="info-value">${incident.patient_age || 'Unknown'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Condition</span>
                                    <span class="info-value">${incident.patient_condition || 'Unknown'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Status</span>
                                    <span class="info-value">${incident.status}</span>
                                </div>
                            </div>
                        </div>

                        ${latestVital ? `
                        <div class="vitals-section">
                            <div class="vitals-header">
                                <h4><i class="fa fa-heart-pulse"></i> Latest Vitals</h4>
                                <span style="color: var(--system-gray); font-size: 12px;">
                                    ${new Date(latestVital.recorded_at).toLocaleString()}
                                </span>
                            </div>
                            <div class="vitals-grid">
                                <div class="vital-stat">
                                    <div class="vital-value">${latestVital.heart_rate}</div>
                                    <div class="vital-label">Heart Rate</div>
                                </div>
                                <div class="vital-stat">
                                    <div class="vital-value">${latestVital.bp_systolic}/${latestVital.bp_diastolic}</div>
                                    <div class="vital-label">Blood Pressure</div>
                                </div>
                                <div class="vital-stat">
                                    <div class="vital-value">${latestVital.oxygen_level}%</div>
                                    <div class="vital-label">SpO2</div>
                                </div>
                                <div class="vital-stat">
                                    <div class="vital-value">${latestVital.temperature}°F</div>
                                    <div class="vital-label">Temperature</div>
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        <div class="actions">
                            <button class="btn btn-primary" onclick="acceptIncident(${incident.id})">
                                <i class="fa fa-check"></i> Accept Incident
                            </button>
                            <button class="btn btn-secondary" onclick="viewDetails(${incident.id})">
                                <i class="fa fa-eye"></i> View Details
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function acceptIncident(incidentId) {
            if (confirm('Accept this incident and begin monitoring?')) {
                window.vitalwearDB.updateIncident(incidentId, { status: 'ongoing' });
                renderIncidents();
            }
        }

        function viewDetails(incidentId) {
            alert(`Viewing details for incident #${incidentId}`);
        }

        function toggleMobileMenu() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        }

        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            if (window.innerWidth <= 768 &&
                !sidebar.contains(event.target) &&
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            document.getElementById('user-name').textContent = getCurrentUser().name;
            renderIncidents();
        });
    </script>
</body>
</html>
