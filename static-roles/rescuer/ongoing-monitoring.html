<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ongoing Monitoring - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px;
            border-radius: var(--radius);
        }

        .sidebar-logo i {
            font-size: 48px;
            color: white;
        }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: rgba(0, 182, 204, 0.1);
            color: var(--medical-cyan);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: var(--medical-cyan);
            color: white;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--deep-hospital-blue);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .monitoring-grid {
            display: grid;
            gap: 24px;
        }

        .patient-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .patient-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .patient-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(46, 219, 179, 0.1) 0%, rgba(16, 185, 129, 0.1) 100%);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .patient-info h3 {
            color: var(--deep-hospital-blue);
            margin: 0 0 4px 0;
            font-size: 1.2rem;
        }

        .patient-info p {
            color: var(--system-gray);
            margin: 0;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-ongoing {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .status-critical {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .status-stable {
            background: rgba(16, 185, 129, 0.15);
            color: var(--health-green);
        }

        .patient-body {
            padding: 24px;
        }

        .vitals-section {
            margin-bottom: 24px;
        }

        .vitals-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .vitals-header h4 {
            color: var(--deep-hospital-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .last-update {
            color: var(--system-gray);
            font-size: 12px;
        }

        .vitals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .vital-card {
            background: rgba(240, 244, 248, 0.5);
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            transition: all 0.3s ease;
        }

        .vital-card:hover {
            background: rgba(240, 244, 248, 0.8);
            transform: translateY(-2px);
        }

        .vital-card.critical {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .vital-card.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .vital-card.normal {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .vital-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .vital-value.critical {
            color: #ef4444;
        }

        .vital-value.warning {
            color: #f59e0b;
        }

        .vital-value.normal {
            color: var(--health-green);
        }

        .vital-label {
            color: var(--system-gray);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .vital-trend {
            font-size: 12px;
            margin-top: 4px;
        }

        .trend-up {
            color: #ef4444;
        }

        .trend-down {
            color: var(--health-green);
        }

        .trend-stable {
            color: var(--system-gray);
        }

        .actions-section {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: var(--health-green);
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--system-gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: 0 -4px 20px rgba(10, 42, 85, 0.08);
            padding: 12px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 998;
        }

        .bottom-nav .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius);
            color: var(--system-gray);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 12px;
        }

        .bottom-nav .bottom-item i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .bottom-nav .bottom-item:hover {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.1);
            transform: translateY(-2px);
        }

        .bottom-nav .bottom-item.active {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.15);
        }

        .bottom-nav .bottom-item.active i {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .topbar {
                left: 0;
                padding: 12px 16px;
            }
            
            .container {
                margin-left: 0;
                margin-top: 60px;
                padding: 16px;
            }
            
            .header {
                padding: 24px 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .patient-header {
                padding: 16px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .patient-info h3 {
                font-size: 1.1rem;
            }
            
            .patient-body {
                padding: 20px 16px;
            }
            
            .vitals-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .vital-card {
                padding: 16px;
            }
            
            .vital-value {
                font-size: 1.5rem;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .bottom-nav {
                padding: 8px 12px;
            }
            
            .bottom-nav .bottom-item {
                padding: 8px 12px;
                font-size: 11px;
            }
            
            .bottom-nav .bottom-item i {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .vitals-grid {
                grid-template-columns: 1fr;
            }
            
            .vital-value {
                font-size: 1.3rem;
            }
            
            .header h1 {
                font-size: 1.3rem;
            }
            
            .vital-card {
                padding: 12px;
            }
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--medical-cyan);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Rescuer User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="transferred-incidents.html"><i class="fa fa-exclamation-circle"></i> Transferred Incidents</a>
        <a href="ongoing-monitoring.html" class="active"><i class="fa fa-heart-pulse"></i> Ongoing Monitoring</a>
        <a href="completed-cases.html"><i class="fa fa-check-circle"></i> Completed Cases</a>
        <a href="incident-records.html"><i class="fa fa-folder"></i> Incident Records</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <h1><i class="fa fa-heart-pulse"></i> Ongoing Monitoring</h1>
            <p>Real-time vital signs monitoring for active patients</p>
        </header>

        <div class="monitoring-grid" id="monitoring-container">
            <!-- Patients will be populated here -->
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-item">
            <i class="fa fa-gauge"></i>
            <span>Home</span>
        </a>
        <a href="transferred-incidents.html" class="bottom-item">
            <i class="fa fa-exclamation-circle"></i>
            <span>Transfer</span>
        </a>
        <a href="ongoing-monitoring.html" class="bottom-item active">
            <i class="fa fa-heart-pulse"></i>
            <span>Monitor</span>
        </a>
        <a href="completed-cases.html" class="bottom-item">
            <i class="fa fa-check-circle"></i>
            <span>Complete</span>
        </a>
        <a href="#" onclick="logout()" class="bottom-item">
            <i class="fa fa-sign-out"></i>
            <span>Logout</span>
        </a>
    </nav>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Rescuer User', role: 'rescuer', id: 3 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'rescuer') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function getVitalStatus(value, type) {
            if (type === 'heart_rate') {
                if (value > 100 || value < 60) return 'critical';
                if (value > 90 || value < 70) return 'warning';
                return 'normal';
            }
            if (type === 'bp_systolic') {
                if (value > 140 || value < 90) return 'critical';
                if (value > 130 || value < 100) return 'warning';
                return 'normal';
            }
            if (type === 'oxygen_level') {
                if (value < 90) return 'critical';
                if (value < 95) return 'warning';
                return 'normal';
            }
            if (type === 'temperature') {
                if (value > 103 || value < 95) return 'critical';
                if (value > 101 || value < 97) return 'warning';
                return 'normal';
            }
            return 'normal';
        }

        function getVitalTrend(current, previous) {
            if (!previous) return 'stable';
            if (current > previous) return 'up';
            if (current < previous) return 'down';
            return 'stable';
        }

        function renderMonitoring() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'rescuer');
            const ongoingIncidents = incidents.filter(i => i.status === 'ongoing');
            const container = document.getElementById('monitoring-container');
            
            if (ongoingIncidents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-heart-pulse"></i>
                        <h3 style="color: var(--deep-hospital-blue); margin-bottom: 8px;">No Active Monitoring</h3>
                        <p>No patients are currently being monitored.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = ongoingIncidents.map(incident => createPatientCard(incident)).join('');
        }

        function createPatientCard(incident) {
            const vitals = window.vitalwearDB.getVitalsByIncident(incident.id);
            const latestVital = vitals[vitals.length - 1];
            const previousVital = vitals[vitals.length - 2];
            
            if (!latestVital) {
                return `
                    <div class="patient-card">
                        <div class="patient-header">
                            <div class="patient-info">
                                <h3><i class="fa fa-user"></i> ${incident.patient_name}</h3>
                                <p>Incident #${incident.id} • No vitals recorded</p>
                            </div>
                            <span class="status-badge status-ongoing">Ongoing</span>
                        </div>
                        <div class="patient-body">
                            <div class="actions-section">
                                <button class="btn btn-primary" onclick="recordVitals(${incident.id})">
                                    <i class="fa fa-plus"></i> Record Vitals
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            const heartRateStatus = getVitalStatus(latestVital.heart_rate, 'heart_rate');
            const bpStatus = getVitalStatus(latestVital.bp_systolic, 'bp_systolic');
            const oxygenStatus = getVitalStatus(latestVital.oxygen_level, 'oxygen_level');
            const tempStatus = getVitalStatus(latestVital.temperature, 'temperature');
            
            const heartRateTrend = getVitalTrend(latestVital.heart_rate, previousVital?.heart_rate);
            const bpTrend = getVitalTrend(latestVital.bp_systolic, previousVital?.bp_systolic);
            const oxygenTrend = getVitalTrend(latestVital.oxygen_level, previousVital?.oxygen_level);
            const tempTrend = getVitalTrend(latestVital.temperature, previousVital?.temperature);
            
            // Determine overall patient status
            const hasCritical = [heartRateStatus, bpStatus, oxygenStatus, tempStatus].includes('critical');
            const hasWarning = [heartRateStatus, bpStatus, oxygenStatus, tempStatus].includes('warning');
            const overallStatus = hasCritical ? 'critical' : hasWarning ? 'warning' : 'stable';
            
            return `
                <div class="patient-card">
                    <div class="patient-header">
                        <div class="patient-info">
                            <h3><i class="fa fa-user"></i> ${incident.patient_name}</h3>
                            <p>Incident #${incident.id} • Age: ${incident.patient_age || 'Unknown'}</p>
                        </div>
                        <span class="status-badge status-${overallStatus}">${overallStatus.toUpperCase()}</span>
                    </div>
                    <div class="patient-body">
                        <div class="vitals-section">
                            <div class="vitals-header">
                                <h4><i class="fa fa-heart-pulse"></i> Current Vitals</h4>
                                <span class="last-update">Last: ${new Date(latestVital.recorded_at).toLocaleString()}</span>
                            </div>
                            <div class="vitals-grid">
                                <div class="vital-card ${heartRateStatus}">
                                    <div class="vital-value ${heartRateStatus}">${latestVital.heart_rate}</div>
                                    <div class="vital-label">Heart Rate</div>
                                    <div class="vital-trend trend-${heartRateTrend}">
                                        ${heartRateTrend === 'up' ? '↗' : heartRateTrend === 'down' ? '↘' : '→'} bpm
                                    </div>
                                </div>
                                <div class="vital-card ${bpStatus}">
                                    <div class="vital-value ${bpStatus}">${latestVital.bp_systolic}/${latestVital.bp_diastolic}</div>
                                    <div class="vital-label">Blood Pressure</div>
                                    <div class="vital-trend trend-${bpTrend}">
                                        ${bpTrend === 'up' ? '↗' : bpTrend === 'down' ? '↘' : '→'} mmHg
                                    </div>
                                </div>
                                <div class="vital-card ${oxygenStatus}">
                                    <div class="vital-value ${oxygenStatus}">${latestVital.oxygen_level}%</div>
                                    <div class="vital-label">SpO2</div>
                                    <div class="vital-trend trend-${oxygenTrend}">
                                        ${oxygenTrend === 'up' ? '↗' : oxygenTrend === 'down' ? '↘' : '→'} %
                                    </div>
                                </div>
                                <div class="vital-card ${tempStatus}">
                                    <div class="vital-value ${tempStatus}">${latestVital.temperature}°F</div>
                                    <div class="vital-label">Temperature</div>
                                    <div class="vital-trend trend-${tempTrend}">
                                        ${tempTrend === 'up' ? '↗' : tempTrend === 'down' ? '↘' : '→'} °F
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="actions-section">
                            <button class="btn btn-primary" onclick="recordVitals(${incident.id})">
                                <i class="fa fa-plus"></i> Update Vitals
                            </button>
                            <button class="btn btn-success" onclick="viewHistory(${incident.id})">
                                <i class="fa fa-history"></i> View History
                            </button>
                            ${overallStatus === 'critical' ? 
                                `<button class="btn btn-warning" onclick="alertPatient(${incident.id})">
                                    <i class="fa fa-exclamation-triangle"></i> Alert Hospital
                                </button>` : ''
                            }
                            <button class="btn btn-danger" onclick="completeCase(${incident.id})">
                                <i class="fa fa-check"></i> Complete Case
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function recordVitals(incidentId) {
            // Simulate vital recording
            const newVitals = {
                incident_id: incidentId,
                heart_rate: Math.floor(Math.random() * 40) + 60,
                bp_systolic: Math.floor(Math.random() * 40) + 100,
                bp_diastolic: Math.floor(Math.random() * 20) + 60,
                oxygen_level: Math.floor(Math.random() * 10) + 90,
                temperature: (Math.random() * 4 + 97).toFixed(1)
            };
            
            window.vitalwearDB.addVital(newVitals);
            renderMonitoring();
        }

        function viewHistory(incidentId) {
            alert(`Viewing vital history for incident #${incidentId}`);
        }

        function alertPatient(incidentId) {
            if (confirm('Send critical alert to hospital?')) {
                alert('Alert sent to hospital emergency team');
            }
        }

        function completeCase(incidentId) {
            if (confirm('Mark this case as completed?')) {
                const success = window.vitalwearDB.completeIncident(incidentId);
                if (success) {
                    alert('Case completed successfully!');
                    renderMonitoring();
                } else {
                    alert('Failed to complete case');
                }
            }
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        // Auto-refresh vitals every 30 seconds
        function startAutoRefresh() {
            setInterval(() => {
                renderMonitoring();
            }, 30000);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            renderMonitoring();
            startAutoRefresh();
        });
    </script>
</body>
</html>
