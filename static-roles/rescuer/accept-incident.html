<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Incident - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* VitalWear Soft UI Design System */
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .accept-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
            border: 1px solid rgba(169, 183, 198, 0.2);
        }

        .accept-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--health-green) 0%, #20c997 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: white;
        }

        .accept-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--deep-hospital-blue);
            margin-bottom: 16px;
        }

        .accept-message {
            font-size: 1.1rem;
            color: var(--system-gray);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--health-green) 0%, #20c997 100%);
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--system-gray);
            color: white;
            margin-left: 12px;
        }

        .btn-secondary:hover {
            background: #8B98A8;
        }

        .loading {
            display: none;
            margin-top: 24px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accept-card">
            <div class="accept-icon">
                <i class="fa fa-check"></i>
            </div>
            <h1 class="accept-title">Accepting Incident...</h1>
            <p class="accept-message">
                Please wait while we accept this incident and prepare it for monitoring.
            </p>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span style="margin-left: 10px;">Processing...</span>
            </div>
            
            <div id="success-message" style="display: none;">
                <div style="color: var(--health-green); font-size: 1.1rem; margin-bottom: 20px;">
                    <i class="fa fa-check-circle"></i> Incident accepted successfully!
                </div>
                <button class="btn btn-success" onclick="goToMonitoring()">
                    <i class="fa fa-heart-pulse"></i> Start Monitoring
                </button>
            </div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Rescuer User', role: 'rescuer', id: 3 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'rescuer') {
                window.location.href = '../index.html';
                return;
            }
        }

        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function acceptIncident() {
            const incidentId = getUrlParameter('id');
            const user = getCurrentUser();
            
            if (!incidentId) {
                window.location.href = 'transferred-incidents.html';
                return;
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            
            // Simulate database operation
            setTimeout(() => {
                const success = window.vitalwearDB.updateIncident(parseInt(incidentId), {
                    status: 'ongoing'
                });
                
                if (success) {
                    // Hide loading and show success
                    document.getElementById('loading').style.display = 'none';
                    document.querySelector('.accept-title').textContent = 'Incident Accepted!';
                    document.querySelector('.accept-message').textContent = `Incident #${incidentId} has been accepted and is ready for monitoring.`;
                    document.getElementById('success-message').style.display = 'block';
                    
                    // Log activity
                    window.vitalwearDB.logActivity(user.name, 'rescuer', `Accepted incident #${incidentId} for monitoring`);
                } else {
                    document.getElementById('loading').style.display = 'none';
                    document.querySelector('.accept-message').textContent = 'Failed to accept incident. Please try again.';
                    document.querySelector('.accept-message').style.color = 'var(--error)';
                }
            }, 1500);
        }

        function goToMonitoring() {
            window.location.href = 'ongoing-monitoring.html';
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            acceptIncident();
        });
    </script>
</body>
</html>
