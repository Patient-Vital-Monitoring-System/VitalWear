<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vitals - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* VitalWear Soft UI Design System */
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Soft UI Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px;
            border-radius: var(--radius);
        }

        .sidebar-logo i {
            font-size: 48px;
            color: white;
        }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: rgba(0, 182, 204, 0.1);
            color: var(--medical-cyan);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        /* Soft UI Header */
        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--deep-hospital-blue);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Main Container */
        .container {
            margin-left: 280px;
            margin-top: 80px;
            padding: 24px;
            display: block;
            overflow-y: auto;
        }

        /* Form Card */
        .form-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(169, 183, 198, 0.2);
            margin-bottom: 24px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h2 {
            color: var(--deep-hospital-blue);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .form-header p {
            color: var(--system-gray);
            font-size: 1.1rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--deep-hospital-blue);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(169, 183, 198, 0.3);
            border-radius: var(--radius);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--medical-cyan);
            box-shadow: 0 0 0 3px rgba(0, 182, 204, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Buttons */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--system-gray);
            color: white;
            margin-left: 12px;
        }

        .btn-secondary:hover {
            background: #8B98A8;
        }

        .form-actions {
            text-align: center;
            margin-top: 32px;
        }

        /* Message */
        .message {
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--health-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                margin-left: 0;
                padding: 16px;
                margin-top: 60px;
            }
            
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .topbar {
                left: 0;
                padding: 12px 16px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-card {
                padding: 24px;
            }
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--medical-cyan);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Rescuer User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="transferred-incidents.html"><i class="fa fa-exclamation-circle"></i> Transferred Incidents</a>
        <a href="ongoing-monitoring.html"><i class="fa fa-heart-pulse"></i> Ongoing Monitoring</a>
        <a href="completed-cases.html"><i class="fa fa-check-circle"></i> Completed Cases</a>
        <a href="incident-records.html"><i class="fa fa-folder"></i> Incident Records</a>
        <a href="add-vitals.html" class="active"><i class="fa fa-plus"></i> Add Vitals</a>
        <a href="return-device.html"><i class="fa fa-undo"></i> Return Device</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <div id="message" class="message"></div>

        <div class="form-card">
            <div class="form-header">
                <h2><i class="fa fa-heart-pulse"></i> Add Vital Signs</h2>
                <p>Record vital signs for an incident</p>
            </div>

            <form id="vitals-form">
                <div class="form-group">
                    <label for="incident-select">Select Incident *</label>
                    <select id="incident-select" required>
                        <option value="">-- Select Incident --</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="heart-rate">Heart Rate (bpm) *</label>
                        <input type="number" id="heart-rate" min="40" max="200" required placeholder="72">
                    </div>
                    <div class="form-group">
                        <label for="temperature">Temperature (°F) *</label>
                        <input type="number" id="temperature" min="95" max="105" step="0.1" required placeholder="98.6">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bp-systolic">Blood Pressure - Systolic *</label>
                        <input type="number" id="bp-systolic" min="80" max="200" required placeholder="120">
                    </div>
                    <div class="form-group">
                        <label for="bp-diastolic">Blood Pressure - Diastolic *</label>
                        <input type="number" id="bp-diastolic" min="40" max="120" required placeholder="80">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="oxygen-level">Oxygen Level (%) *</label>
                        <input type="number" id="oxygen-level" min="70" max="100" required placeholder="98">
                    </div>
                    <div class="form-group">
                        <label for="respiratory-rate">Respiratory Rate (breaths/min)</label>
                        <input type="number" id="respiratory-rate" min="8" max="40" placeholder="16">
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Additional Notes</label>
                    <input type="text" id="notes" placeholder="Enter any additional observations...">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa fa-save"></i> Save Vitals
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <i class="fa fa-refresh"></i> Reset
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Rescuer User', role: 'rescuer', id: 3 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'rescuer') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccessMessage(message) {
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 3000);
        }

        function populateIncidents() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'rescuer');
            const ongoingIncidents = incidents.filter(i => i.status === 'ongoing' || i.status === 'transferred');
            const select = document.getElementById('incident-select');
            
            // Clear existing options
            select.innerHTML = '<option value="">-- Select Incident --</option>';
            
            if (ongoingIncidents.length === 0) {
                select.innerHTML = '<option value="">-- No Active Incidents --</option>';
                select.disabled = true;
                return;
            }
            
            ongoingIncidents.forEach(incident => {
                const option = document.createElement('option');
                option.value = incident.id;
                option.textContent = `#${incident.id} - ${incident.patient_name}`;
                select.appendChild(option);
            });
        }

        function addVitals(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            
            const vitalData = {
                incident_id: parseInt(formData.get('incident-select')),
                heart_rate: parseInt(document.getElementById('heart-rate').value),
                temperature: parseFloat(document.getElementById('temperature').value),
                bp_systolic: parseInt(document.getElementById('bp-systolic').value),
                bp_diastolic: parseInt(document.getElementById('bp-diastolic').value),
                oxygen_level: parseInt(document.getElementById('oxygen-level').value),
                respiratory_rate: parseInt(document.getElementById('respiratory-rate').value) || 16
            };
            
            // Validate vital ranges
            if (vitalData.heart_rate < 40 || vitalData.heart_rate > 200) {
                showMessage('Heart rate must be between 40-200 bpm', 'error');
                return;
            }
            
            if (vitalData.oxygen_level < 70 || vitalData.oxygen_level > 100) {
                showMessage('Oxygen level must be between 70-100%', 'error');
                return;
            }
            
            const newVital = window.vitalwearDB.addVital(vitalData);
            
            if (newVital) {
                showSuccessMessage(`Vitals recorded successfully for incident #${vitalData.incident_id}!`);
                
                // Log activity
                const user = getCurrentUser();
                window.vitalwearDB.logActivity(user.name, 'rescuer', `Vitals recorded for incident #${vitalData.incident_id}`);
                
                // Reset form
                resetForm();
                
                // Redirect to ongoing monitoring after delay
                setTimeout(() => {
                    window.location.href = 'ongoing-monitoring.html';
                }, 2000);
            } else {
                showMessage('Failed to record vitals', 'error');
            }
        }

        function resetForm() {
            document.getElementById('vitals-form').reset();
            populateIncidents();
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            populateIncidents();
            
            // Setup form submission
            document.getElementById('vitals-form').addEventListener('submit', addVitals);
        });
    </script>
</body>
</html>
