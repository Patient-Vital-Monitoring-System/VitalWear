<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Device - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* VitalWear Soft UI Design System */
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Soft UI Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px;
            border-radius: var(--radius);
        }

        .sidebar-logo i {
            font-size: 48px;
            color: white;
        }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: rgba(0, 182, 204, 0.1);
            color: var(--medical-cyan);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
            box-shadow: var(--shadow-sm);
            transform: translateX(4px);
        }

        /* Soft UI Header */
        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--deep-hospital-blue);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Main Container */
        .container {
            margin-left: 280px;
            margin-top: 80px;
            padding: 24px;
            display: block;
            overflow-y: auto;
        }

        /* Device Card */
        .device-card {
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(169, 183, 198, 0.2);
            margin-bottom: 24px;
            text-align: center;
        }

        .device-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: white;
        }

        .device-info {
            margin-bottom: 32px;
        }

        .device-info h2 {
            color: var(--deep-hospital-blue);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .device-info p {
            color: var(--system-gray);
            font-size: 1.1rem;
            margin: 8px 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .status-assigned {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .status-available {
            background: rgba(46, 219, 179, 0.15);
            color: var(--health-green);
        }

        /* Buttons */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            color: white;
            box-shadow: var(--shadow);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--system-gray);
            color: white;
            margin-left: 12px;
        }

        .btn-secondary:hover {
            background: #8B98A8;
        }

        .no-device {
            text-align: center;
            padding: 60px 20px;
            color: var(--system-gray);
        }

        .no-device i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Message */
        .message {
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--health-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                margin-left: 0;
                padding: 16px;
                margin-top: 60px;
            }
            
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .topbar {
                left: 0;
                padding: 12px 16px;
            }
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--medical-cyan);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Rescuer User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="transferred-incidents.html"><i class="fa fa-exclamation-circle"></i> Transferred Incidents</a>
        <a href="ongoing-monitoring.html"><i class="fa fa-heart-pulse"></i> Ongoing Monitoring</a>
        <a href="completed-cases.html"><i class="fa fa-check-circle"></i> Completed Cases</a>
        <a href="incident-records.html"><i class="fa fa-folder"></i> Incident Records</a>
        <a href="return-device.html" class="active"><i class="fa fa-undo"></i> Return Device</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <div id="message" class="message"></div>

        <div id="device-content">
            <!-- Device content will be populated here -->
        </div>
    </main>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Rescuer User', role: 'rescuer', id: 3 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'rescuer') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccessMessage(message) {
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 3000);
        }

        function renderDevice() {
            const user = getCurrentUser();
            const devices = window.vitalwearDB.getDevices();
            const assignedDevice = devices.find(d => d.assigned_to === user.id && d.status === 'assigned');
            const container = document.getElementById('device-content');
            
            if (assignedDevice) {
                container.innerHTML = `
                    <div class="device-card">
                        <div class="device-icon">
                            <i class="fa fa-box"></i>
                        </div>
                        <div class="device-info">
                            <h2>Assigned Device</h2>
                            <p><strong>Serial Number:</strong> ${assignedDevice.serial}</p>
                            <p><strong>Status:</strong> <span class="status-badge status-assigned">Assigned</span></p>
                            <p><strong>Assigned Date:</strong> ${new Date(assignedDevice.created_at).toLocaleDateString()}</p>
                        </div>
                        <div>
                            <button class="btn btn-danger" onclick="returnDevice()">
                                <i class="fa fa-undo"></i> Return Device
                            </button>
                            <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                                <i class="fa fa-arrow-left"></i> Back to Dashboard
                            </button>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="no-device">
                        <div class="device-icon" style="background: var(--system-gray);">
                            <i class="fa fa-box"></i>
                        </div>
                        <h2 style="color: var(--deep-hospital-blue); margin-bottom: 16px;">No Assigned Device</h2>
                        <p style="font-size: 1.1rem; margin-bottom: 32px;">You don't currently have any device assigned to you.</p>
                        <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                            <i class="fa fa-arrow-left"></i> Back to Dashboard
                        </button>
                    </div>
                `;
            }
        }

        function returnDevice() {
            const user = getCurrentUser();
            const devices = window.vitalwearDB.getDevices();
            const assignedDevice = devices.find(d => d.assigned_to === user.id && d.status === 'assigned');
            
            if (!assignedDevice) {
                showMessage('No device assigned to return', 'error');
                return;
            }
            
            if (confirm(`Are you sure you want to return device ${assignedDevice.serial}?`)) {
                const success = window.vitalwearDB.returnDevice(assignedDevice.id);
                
                if (success) {
                    showSuccessMessage(`Device ${assignedDevice.serial} returned successfully!`);
                    
                    // Log activity
                    window.vitalwearDB.logActivity(user.name, 'rescuer', `Returned device ${assignedDevice.serial}`);
                    
                    // Refresh the page after a short delay
                    setTimeout(() => {
                        renderDevice();
                    }, 1500);
                } else {
                    showMessage('Failed to return device', 'error');
                }
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            renderDevice();
        });
    </script>
</body>
</html>
