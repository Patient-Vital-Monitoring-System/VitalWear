<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completed Cases - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-hospital-blue: #0A2A55;
            --medical-cyan: #00B6CC;
            --trust-blue: #0A85CC;
            --health-green: #2EDBB3;
            --clinical-white: #F0F4F8;
            --system-gray: #A9B7C6;
            --surface: #ffffff;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 4px rgba(10, 42, 85, 0.06);
            --shadow: 0 4px 12px rgba(10, 42, 85, 0.08);
            --shadow-md: 0 8px 24px rgba(10, 42, 85, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--clinical-white);
            color: var(--deep-hospital-blue);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: var(--shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 24px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            margin: 12px;
            border-radius: var(--radius);
        }

        .sidebar-logo i {
            font-size: 48px;
            color: white;
        }

        #sidebar a {
            color: var(--deep-hospital-blue);
            margin: 6px 12px;
            padding: 12px 16px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: rgba(0, 182, 204, 0.1);
            color: var(--medical-cyan);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: var(--medical-cyan);
            color: white;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--deep-hospital-blue);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            box-shadow: var(--shadow-sm);
            padding: 16px 24px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--deep-hospital-blue) 0%, var(--trust-blue) 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
            text-align: center;
        }

        .stat-card h3 {
            color: var(--health-green);
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--health-green);
        }

        .cases-grid {
            display: grid;
            gap: 24px;
        }

        .case-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(169, 183, 198, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .case-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .case-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(46, 219, 179, 0.1) 0%, rgba(16, 185, 129, 0.1) 100%);
            border-bottom: 1px solid rgba(169, 183, 198, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .case-info h3 {
            color: var(--deep-hospital-blue);
            margin: 0 0 4px 0;
            font-size: 1.2rem;
        }

        .case-info p {
            color: var(--system-gray);
            margin: 0;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-completed {
            background: rgba(46, 219, 179, 0.15);
            color: var(--health-green);
        }

        .case-body {
            padding: 24px;
        }

        .case-summary {
            margin-bottom: 20px;
        }

        .case-summary h4 {
            color: var(--deep-hospital-blue);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-label {
            color: var(--system-gray);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .summary-value {
            color: var(--deep-hospital-blue);
            font-weight: 600;
        }

        .vitals-summary {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(169, 183, 198, 0.2);
        }

        .vitals-summary h4 {
            color: var(--deep-hospital-blue);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vitals-mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .vital-mini {
            text-align: center;
            padding: 12px;
            background: rgba(240, 244, 248, 0.5);
            border-radius: var(--radius);
        }

        .vital-mini-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--deep-hospital-blue);
            margin-bottom: 4px;
        }

        .vital-mini-label {
            color: var(--system-gray);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--medical-cyan) 0%, var(--trust-blue) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--system-gray);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--system-gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid rgba(169, 183, 198, 0.3);
            box-shadow: 0 -4px 20px rgba(10, 42, 85, 0.08);
            padding: 12px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 998;
        }

        .bottom-nav .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--radius);
            color: var(--system-gray);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 12px;
        }

        .bottom-nav .bottom-item i {
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .bottom-nav .bottom-item:hover {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.1);
            transform: translateY(-2px);
        }

        .bottom-nav .bottom-item.active {
            color: var(--medical-cyan);
            background: rgba(0, 182, 204, 0.15);
        }

        .bottom-nav .bottom-item.active i {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .topbar {
                left: 0;
                padding: 12px 16px;
            }
            
            .container {
                margin-left: 0;
                margin-top: 60px;
                padding: 16px;
            }
            
            .header {
                padding: 24px 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            
            .stat-card {
                padding: 20px;
            }
            
            .stat-number {
                font-size: 1.5rem;
            }
            
            .case-header {
                padding: 16px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .case-info h3 {
                font-size: 1.1rem;
            }
            
            .case-body {
                padding: 20px 16px;
            }
            
            .summary-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .vitals-mini-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .bottom-nav {
                padding: 8px 12px;
            }
            
            .bottom-nav .bottom-item {
                padding: 8px 12px;
                font-size: 11px;
            }
            
            .bottom-nav .bottom-item i {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .vitals-mini-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.3rem;
            }
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--medical-cyan);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-heart-pulse" style="font-size: 24px; color: var(--medical-cyan);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--deep-hospital-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--medical-cyan);"></i>
            <span id="user-name">Rescuer User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="transferred-incidents.html"><i class="fa fa-exclamation-circle"></i> Transferred Incidents</a>
        <a href="ongoing-monitoring.html"><i class="fa fa-heart-pulse"></i> Ongoing Monitoring</a>
        <a href="completed-cases.html" class="active"><i class="fa fa-check-circle"></i> Completed Cases</a>
        <a href="incident-records.html"><i class="fa fa-folder"></i> Incident Records</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <h1><i class="fa fa-check-circle"></i> Completed Cases</h1>
            <p>Successfully transported and treated patients</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Completed</h3>
                <div class="stat-number" id="total-completed">0</div>
            </div>
            <div class="stat-card">
                <h3>This Month</h3>
                <div class="stat-number" id="monthly-completed">0</div>
            </div>
            <div class="stat-card">
                <h3>Avg. Transport Time</h3>
                <div class="stat-number" id="avg-transport-time">0m</div>
            </div>
            <div class="stat-card">
                <h3>Success Rate</h3>
                <div class="stat-number" id="success-rate">100%</div>
            </div>
        </div>

        <div class="cases-grid" id="cases-container">
            <!-- Completed cases will be populated here -->
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-item">
            <i class="fa fa-gauge"></i>
            <span>Home</span>
        </a>
        <a href="transferred-incidents.html" class="bottom-item">
            <i class="fa fa-exclamation-circle"></i>
            <span>Transfer</span>
        </a>
        <a href="ongoing-monitoring.html" class="bottom-item">
            <i class="fa fa-heart-pulse"></i>
            <span>Monitor</span>
        </a>
        <a href="completed-cases.html" class="bottom-item active">
            <i class="fa fa-check-circle"></i>
            <span>Complete</span>
        </a>
        <a href="#" onclick="logout()" class="bottom-item">
            <i class="fa fa-sign-out"></i>
            <span>Logout</span>
        </a>
    </nav>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Rescuer User', role: 'rescuer', id: 3 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'rescuer') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function updateStats() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'rescuer');
            const completedIncidents = incidents.filter(i => i.status === 'completed');
            
            document.getElementById('total-completed').textContent = completedIncidents.length;
            
            // Calculate monthly completed
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const monthlyCompleted = completedIncidents.filter(incident => {
                const incidentDate = new Date(incident.created_at);
                return incidentDate.getMonth() === currentMonth && incidentDate.getFullYear() === currentYear;
            });
            document.getElementById('monthly-completed').textContent = monthlyCompleted.length;
            
            // Mock average transport time
            document.getElementById('avg-transport-time').textContent = '18m';
        }

        function renderCases() {
            const user = getCurrentUser();
            const incidents = window.vitalwearDB.getIncidentsByUser(user.id, 'rescuer');
            const completedIncidents = incidents.filter(i => i.status === 'completed');
            const container = document.getElementById('cases-container');
            
            if (completedIncidents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-check-circle"></i>
                        <h3 style="color: var(--deep-hospital-blue); margin-bottom: 8px;">No Completed Cases</h3>
                        <p>No cases have been completed yet.</p>
                    </div>
                `;
                return;
            }
            
            // Sort by completion date (most recent first)
            completedIncidents.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
            
            container.innerHTML = completedIncidents.map(incident => createCaseCard(incident)).join('');
        }

        function createCaseCard(incident) {
            const vitals = window.vitalwearDB.getVitalsByIncident(incident.id);
            const finalVitals = vitals[vitals.length - 1];
            
            // Calculate duration (mock calculation)
            const createdDate = new Date(incident.created_at);
            const completedDate = new Date(incident.updated_at);
            const duration = Math.round((completedDate - createdDate) / (1000 * 60)); // in minutes
            
            return `
                <div class="case-card">
                    <div class="case-header">
                        <div class="case-info">
                            <h3><i class="fa fa-check-circle"></i> Case #${incident.id}</h3>
                            <p>${incident.patient_name} • ${duration} minutes</p>
                        </div>
                        <span class="status-badge status-completed">Completed</span>
                    </div>
                    <div class="case-body">
                        <div class="case-summary">
                            <h4><i class="fa fa-info-circle"></i> Case Summary</h4>
                            <div class="summary-grid">
                                <div class="summary-item">
                                    <span class="summary-label">Patient</span>
                                    <span class="summary-value">${incident.patient_name}</span>
                                </div>
                                <div class="summary-item">
                                    <span class="summary-label">Age</span>
                                    <span class="summary-value">${incident.patient_age || 'Unknown'}</span>
                                </div>
                                <div class="summary-item">
                                    <span class="summary-label">Condition</span>
                                    <span class="summary-value">${incident.patient_condition || 'Unknown'}</span>
                                </div>
                                <div class="summary-item">
                                    <span class="summary-label">Duration</span>
                                    <span class="summary-value">${duration} minutes</span>
                                </div>
                                <div class="summary-item">
                                    <span class="summary-label">Started</span>
                                    <span class="summary-value">${createdDate.toLocaleString()}</span>
                                </div>
                                <div class="summary-item">
                                    <span class="summary-label">Completed</span>
                                    <span class="summary-value">${completedDate.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                        
                        ${finalVitals ? `
                        <div class="vitals-summary">
                            <h4><i class="fa fa-heart-pulse"></i> Final Vitals</h4>
                            <div class="vitals-mini-grid">
                                <div class="vital-mini">
                                    <div class="vital-mini-value">${finalVitals.heart_rate}</div>
                                    <div class="vital-mini-label">Heart Rate</div>
                                </div>
                                <div class="vital-mini">
                                    <div class="vital-mini-value">${finalVitals.bp_systolic}/${finalVitals.bp_diastolic}</div>
                                    <div class="vital-mini-label">BP</div>
                                </div>
                                <div class="vital-mini">
                                    <div class="vital-mini-value">${finalVitals.oxygen_level}%</div>
                                    <div class="vital-mini-label">SpO2</div>
                                </div>
                                <div class="vital-mini">
                                    <div class="vital-mini-value">${finalVital.temperature}°F</div>
                                    <div class="vital-mini-label">Temp</div>
                                </div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="actions">
                            <button class="btn btn-primary" onclick="viewFullReport(${incident.id})">
                                <i class="fa fa-file-medical"></i> Full Report
                            </button>
                            <button class="btn btn-secondary" onclick="exportReport(${incident.id})">
                                <i class="fa fa-download"></i> Export
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function viewFullReport(incidentId) {
            alert(`Viewing full report for case #${incidentId}`);
        }

        function exportReport(incidentId) {
            alert(`Exporting report for case #${incidentId}`);
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            updateStats();
            renderCases();
        });
    </script>
</body>
</html>
