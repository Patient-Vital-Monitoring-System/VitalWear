<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Device - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-50: #E8F4FD;
            --primary-100: #D1E9FB;
            --primary-200: #A9D9F5;
            --primary-300: #7BC4F0;
            --primary-400: #4DAEEA;
            --primary-500: #2E96D5;
            --primary-600: #1E7AB8;
            --primary-700: #1A5F9A;
            --primary-800: #1A4975;
            --primary-900: #1A3A5C;
            
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;
            
            --primary: var(--primary-600);
            --background: var(--gray-50);
            --surface: #ffffff;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            
            --radius: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 32px 24px 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            margin: 16px;
            border-radius: var(--radius-lg);
            color: white;
        }

        .sidebar-logo i {
            font-size: 48px;
        }

        #sidebar a {
            color: var(--text-primary);
            margin: 10px 20px;
            padding: 14px 18px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #sidebar a:hover {
            background: var(--primary-100);
            color: var(--primary);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 20px 32px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .assign-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 32px;
            margin-bottom: 32px;
        }

        .assign-section h2 {
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--surface);
        }

        .form-group select:focus, .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 122, 184, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--gray-600);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .assignments-table {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-header {
            padding: 24px;
            background: var(--gray-50);
            border-bottom: 1px solid var(--border);
        }

        .table-header h2 {
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--gray-50);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        td {
            color: var(--text-secondary);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-returned {
            background: rgba(107, 114, 128, 0.15);
            color: var(--gray-600);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 16px;
            border-radius: var(--radius);
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 14px;
            }
            
            th, td {
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-cogs" style="font-size: 24px; color: var(--primary);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--primary); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--primary);"></i>
            <span id="user-name">Management User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="users.html"><i class="fa fa-users"></i> Manage Users</a>
        <a href="devices.html"><i class="fa fa-box"></i> Device Management</a>
        <a href="assign-device.html" class="active"><i class="fa fa-exchange-alt"></i> Assign Device</a>
        <a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="#" onclick="logout()" class="btn btn-secondary">Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <h1><i class="fa fa-exchange-alt"></i> Device Assignment</h1>
            <p>Assign devices to users and track assignments</p>
        </header>

        <div class="success-message" id="success-message">
            <i class="fa fa-check-circle"></i> Device assigned successfully!
        </div>

        <div class="assign-section">
            <h2><i class="fa fa-plus-circle"></i> New Assignment</h2>
            <form id="assign-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="device-select">Select Device</label>
                        <select id="device-select" required>
                            <option value="">Choose a device...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="user-select">Select User</label>
                        <select id="user-select" required>
                            <option value="">Choose a user...</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa fa-check"></i> Assign Device
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <i class="fa fa-refresh"></i> Reset
                    </button>
                </div>
            </form>
        </div>

        <div class="assignments-table">
            <div class="table-header">
                <h2><i class="fa fa-list"></i> Current Assignments</h2>
            </div>
            <div id="assignments-content">
                <!-- Assignments will be populated here -->
            </div>
        </div>
    </main>

    <script src="../js/database.js"></script>
    <script src="../js/screen-detection.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Management User', role: 'management' };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'management') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function populateDeviceSelect() {
            const devices = window.vitalwearDB.getDevices();
            const select = document.getElementById('device-select');
            
            // Clear existing options
            select.innerHTML = '<option value="">Choose a device...</option>';
            
            // Add available devices
            const availableDevices = devices.filter(d => d.status === 'available');
            availableDevices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.id;
                option.textContent = `${device.serial} - Available`;
                select.appendChild(option);
            });
            
            if (availableDevices.length === 0) {
                select.innerHTML = '<option value="">No available devices</option>';
                select.disabled = true;
            }
        }

        function populateUserSelect() {
            const users = window.vitalwearDB.getUsers();
            const select = document.getElementById('user-select');
            
            // Clear existing options
            select.innerHTML = '<option value="">Choose a user...</option>';
            
            // Add users by role
            ['rescuer', 'responder'].forEach(role => {
                if (users[role] && users[role].length > 0) {
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = role.charAt(0).toUpperCase() + role.slice(1) + 's';
                    
                    users[role].forEach(user => {
                        const option = document.createElement('option');
                        option.value = `${user.id}:${role}`;
                        option.textContent = `${user.name} - ${user.email}`;
                        optgroup.appendChild(option);
                    });
                    
                    select.appendChild(optgroup);
                }
            });
        }

        function renderAssignments() {
            const data = window.vitalwearDB.getData();
            const deviceLogs = data.device_logs || [];
            const devices = data.devices || [];
            const users = window.vitalwearDB.getUsers();
            
            // Get active assignments (not returned)
            const activeAssignments = deviceLogs.filter(log => !log.date_returned);
            
            const container = document.getElementById('assignments-content');
            
            if (activeAssignments.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-exchange-alt"></i>
                        <h3 style="color: var(--text-primary); margin-bottom: 8px;">No Active Assignments</h3>
                        <p>No devices are currently assigned to users.</p>
                    </div>
                `;
                return;
            }
            
            // Create table
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Device</th>
                            <th>User</th>
                            <th>Role</th>
                            <th>Assigned Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${activeAssignments.map(assignment => {
                            const device = devices.find(d => d.id === assignment.device_id);
                            const user = getUserById(assignment.user_id, assignment.user_role);
                            
                            return `
                                <tr>
                                    <td><strong>${device ? device.serial : 'Unknown'}</strong></td>
                                    <td>${user ? user.name : 'Unknown'}</td>
                                    <td>${assignment.user_role.charAt(0).toUpperCase() + assignment.user_role.slice(1)}</td>
                                    <td>${new Date(assignment.date_assigned).toLocaleDateString()}</td>
                                    <td><span class="status-badge status-active">Active</span></td>
                                    <td>
                                        <button class="btn btn-success" onclick="returnDevice(${assignment.device_id})" style="padding: 8px 16px; font-size: 12px;">
                                            <i class="fa fa-undo"></i> Return
                                        </button>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = tableHTML;
        }

        function getUserById(userId, role) {
            const users = window.vitalwearDB.getUsers();
            return users[role]?.find(u => u.id === parseInt(userId));
        }

        function assignDevice(event) {
            event.preventDefault();
            
            const deviceId = parseInt(document.getElementById('device-select').value);
            const userValue = document.getElementById('user-select').value;
            const [userId, userRole] = userValue.split(':');
            
            if (!deviceId || !userId || !userRole) {
                alert('Please select both a device and a user');
                return;
            }
            
            const success = window.vitalwearDB.assignDevice(deviceId, parseInt(userId), userRole);
            
            if (success) {
                // Show success message
                showSuccessMessage('Device assigned successfully!');
                
                // Reset form and update UI
                resetForm();
                populateDeviceSelect();
                renderAssignments();
            } else {
                alert('Failed to assign device');
            }
        }

        function returnDevice(deviceId) {
            if (confirm('Return this device to available status?')) {
                const success = window.vitalwearDB.returnDevice(deviceId);
                
                if (success) {
                    showSuccessMessage('Device returned successfully!');
                    populateDeviceSelect();
                    renderAssignments();
                } else {
                    alert('Failed to return device');
                }
            }
        }

        function showSuccessMessage(message) {
            // Create success message element
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            // Remove after 3 seconds
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 3000);
        }

        function resetForm() {
            document.getElementById('assign-form').reset();
            populateDeviceSelect();
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check if screen is too small for management
            if (window.screenDetector && window.screenDetector.disableForSmallScreens()) {
                console.warn('Management assign-device page disabled due to small screen');
                return;
            }
            
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            populateDeviceSelect();
            populateUserSelect();
            renderAssignments();
            
            // Setup form submission
            document.getElementById('assign-form').addEventListener('submit', assignDevice);
        });
    </script>
</body>
</html>
