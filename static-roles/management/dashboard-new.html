<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* VitalWear Modern Soft UI Design System */
        :root {
            /* Primary Colors - Modern Blue Palette */
            --primary-50: #E8F4FD;
            --primary-100: #D1E9FB;
            --primary-200: #A9D9F5;
            --primary-300: #7BC4F0;
            --primary-400: #4DAEEA;
            --primary-500: #2E96D5;
            --primary-600: #1E7AB8;
            --primary-700: #1A5F9A;
            --primary-800: #1A4975;
            --primary-900: #1A3A5C;
            
            /* Neutral Colors */
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            /* Semantic Colors */
            --success: #10B981;
            --success-light: #D1FAE5;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --error: #EF4444;
            --error-light: #FEE2E2;
            --info: #3B82F6;
            --info-light: #DBEAFE;
            
            /* Core Design Tokens */
            --primary: var(--primary-600);
            --primary-light: var(--primary-100);
            --background: var(--gray-50);
            --surface: #ffffff;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --text-tertiary: var(--gray-500);
            --border: var(--gray-200);
            --border-hover: var(--gray-300);
            --authority-blue: #1B3F72;
            --pure-white: #ffffff;
            --interface-border: rgba(229, 231, 235, 0.8);
            --secondary-text: var(--gray-500);
            
            /* Soft UI Radius System */
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
            
            /* Modern Shadow System */
            --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Modern Soft UI Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .sidebar-logo {
            padding: 32px 24px 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            margin: 16px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .sidebar-logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .sidebar-logo img {
            max-width: 150px;
            height: auto;
            filter: brightness(0) invert(1);
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        #sidebar a {
            color: var(--text-primary);
            margin: 10px 20px;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            transition: all var(--transition);
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        #sidebar a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left var(--transition-slow);
        }

        #sidebar a:hover {
            background: var(--primary-light);
            color: var(--primary);
            transform: translateX(6px);
            box-shadow: var(--shadow);
        }

        #sidebar a:hover::before {
            left: 100%;
        }

        #sidebar a.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        #sidebar a.active::before {
            display: none;
        }

        /* Modern Soft UI Header */
        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 20px 32px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        /* Header Styles */
        .header {
            background: linear-gradient(135deg, var(--authority-blue) 0%, #2a5298 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            margin: 8px 0 0 0;
            opacity: 0.9;
            font-size: 1rem;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--pure-white);
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--interface-border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--authority-blue) 0%, #2a5298 100%);
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .stat-card h3 {
            margin: 0 0 16px 0;
            color: var(--authority-blue);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--authority-blue);
            margin: 0;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--pure-white);
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--interface-border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        .chart-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--authority-blue) 0%, #2a5298 100%);
        }

        .chart-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .chart-card h4 {
            margin: 0 0 20px 0;
            color: var(--authority-blue);
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .chart-card .chart-container {
            flex: 1;
            position: relative;
            min-height: 250px;
            width: 100%;
        }

        .chart-card canvas {
            width: 100% !important;
            height: 250px !important;
            max-width: 100%;
            display: block;
        }

        /* Recent Activities */
        .recent-activities {
            background: var(--pure-white);
            padding: 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--interface-border);
        }

        .recent-activities h3 {
            margin: 0 0 20px 0;
            color: var(--authority-blue);
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .activity-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--interface-border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-time {
            color: var(--secondary-text);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }
            
            .user-section {
                text-align: center;
            }
            
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-cogs" style="font-size: 24px; color: var(--authority-blue);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--authority-blue); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--authority-blue);"></i>
            <span id="user-name">Management User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-cogs" style="font-size: 48px; color: white;"></i>
        </div>
        <a href="dashboard.html" class="active"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="users.html"><i class="fa fa-users"></i> Manage Users</a>
        <a href="devices.html"><i class="fa fa-box"></i> Device Management</a>
        <a href="assign-device.html"><i class="fa fa-exchange-alt"></i> Assign Device</a>
        <a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="#" onclick="logout()" class="btn btn-secondary">Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <div class="header-content">
                <div>
                    <h1>
                        <i class="fa fa-cogs"></i>
                        Management Dashboard
                    </h1>
                    <p>VitalWear Device Management System</p>
                </div>
                <div class="user-section">
                    <div class="user-info">
                        <i class="fa fa-user-circle"></i>
                        Welcome, <span id="welcome-name">Management User</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="dashboard-grid" id="stats-grid">
            <!-- Stats will be populated here -->
        </section>

        <!-- Charts Section -->
        <section class="charts-grid">
            <div class="chart-card">
                <h4>
                    <i class="fa fa-chart-pie"></i>
                    Device Status Distribution
                </h4>
                <div class="chart-container">
                    <canvas id="deviceStatusChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h4>
                    <i class="fa fa-chart-line"></i>
                    Incident Trends
                </h4>
                <div class="chart-container">
                    <canvas id="incidentTrendsChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h4>
                    <i class="fa fa-chart-bar"></i>
                    Device Assignment Overview
                </h4>
                <div class="chart-container">
                    <canvas id="deviceAssignmentChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h4>
                    <i class="fa fa-chart-area"></i>
                    Monthly Activity Summary
                </h4>
                <div class="chart-container">
                    <canvas id="monthlyActivityChart"></canvas>
                </div>
            </div>
        </section>

        <section class="recent-activities" id="recent-activities">
            <h3>
                <i class="fa fa-clock"></i>
                Recent Activities
            </h3>
            <!-- Activities will be populated here -->
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/database.js"></script>
    <script src="../js/screen-detection.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Management User', role: 'management', id: 1 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'management') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function updateStats() {
            const stats = window.vitalwearDB.getStats();
            const statsGrid = document.getElementById('stats-grid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h3>Total Devices</h3>
                    <p class="stat-number">${stats.totalDevices}</p>
                </div>
                
                <div class="stat-card">
                    <h3>Available Devices</h3>
                    <p class="stat-number">${stats.availableDevices}</p>
                </div>
                
                <div class="stat-card">
                    <h3>Assigned Devices</h3>
                    <p class="stat-number">${stats.assignedDevices}</p>
                </div>
                
                <div class="stat-card">
                    <h3>Devices Not Yet Returned</h3>
                    <p class="stat-number">${stats.assignedDevices}</p>
                </div>
                
                <div class="stat-card">
                    <h3>Active Incidents</h3>
                    <p class="stat-number">${stats.ongoingIncidents + stats.transferredIncidents}</p>
                </div>
                
                <div class="stat-card">
                    <h3>Completed Incidents</h3>
                    <p class="stat-number">${stats.completedIncidents}</p>
                </div>
            `;
        }

        function renderRecentActivities() {
            const activities = window.vitalwearDB.getRecentActivities();
            const container = document.getElementById('recent-activities');
            
            if (activities.length === 0) {
                container.innerHTML = `
                    <h3>
                        <i class="fa fa-clock"></i>
                        Recent Activities
                    </h3>
                    <div class="activity-item">
                        <strong>No recent activities</strong>
                        <div class="activity-time">System ready</div>
                    </div>
                `;
                return;
            }
            
            const activitiesHtml = activities.slice(0, 10).map(activity => `
                <div class="activity-item">
                    <strong>${activity.user_name || 'Unknown'}</strong>
                    (${activity.user_role}) - 
                    ${activity.description}
                    <div class="activity-time">${new Date(activity.created_at).toLocaleString()}</div>
                </div>
            `).join('');
            
            container.innerHTML = `
                <h3>
                    <i class="fa fa-clock"></i>
                    Recent Activities
                </h3>
                ${activitiesHtml}
            `;
        }

        function createDeviceStatusChart() {
            const stats = window.vitalwearDB.getStats();
            const ctx = document.getElementById('deviceStatusChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Available', 'Assigned', 'Maintenance'],
                    datasets: [{
                        data: [stats.availableDevices, stats.assignedDevices, stats.maintenanceDevices],
                        backgroundColor: [
                            '#2CC990',
                            '#FFC107',
                            '#DC3545'
                        ],
                        borderWidth: 2,
                        borderColor: '#FFFFFF'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    family: 'Inter',
                                    size: 12
                                }
                            }
                        }
                    }
                }
            });
        }

        function createIncidentTrendsChart() {
            const stats = window.vitalwearDB.getStats();
            const ctx = document.getElementById('incidentTrendsChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Active Incidents',
                        data: [12, 19, 15, 25, 22, stats.ongoingIncidents + stats.transferredIncidents],
                        borderColor: '#1B3F72',
                        backgroundColor: 'rgba(27, 63, 114, 0.1)',
                        tension: 0.4,
                        fill: true
                    }, {
                        label: 'Completed Incidents',
                        data: [8, 12, 18, 20, 25, stats.completedIncidents],
                        borderColor: '#2CC990',
                        backgroundColor: 'rgba(44, 201, 144, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    family: 'Inter',
                                    size: 12
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function createDeviceAssignmentChart() {
            const ctx = document.getElementById('deviceAssignmentChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                    datasets: [{
                        label: 'Devices Assigned',
                        data: [5, 8, 6, 9, 7],
                        backgroundColor: '#1B3F72'
                    }, {
                        label: 'Devices Returned',
                        data: [3, 6, 4, 7, 5],
                        backgroundColor: '#2CC990'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    family: 'Inter',
                                    size: 12
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function createMonthlyActivityChart() {
            const ctx = document.getElementById('monthlyActivityChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{
                        label: 'Device Activities',
                        data: [45, 52, 48, 58],
                        borderColor: '#1B3F72',
                        backgroundColor: 'rgba(27, 63, 114, 0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    family: 'Inter',
                                    size: 12
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check if screen is too small for management
            if (window.screenDetector && window.screenDetector.disableForSmallScreens()) {
                console.warn('Management dashboard-new page disabled due to small screen');
                return;
            }
            
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            document.getElementById('welcome-name').textContent = user.name;
            
            updateStats();
            renderRecentActivities();
            
            // Create charts
            createDeviceStatusChart();
            createIncidentTrendsChart();
            createDeviceAssignmentChart();
            createMonthlyActivityChart();
        });
    </script>
</body>
</html>
