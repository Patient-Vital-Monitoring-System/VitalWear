<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Device Return - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* VitalWear Modern Soft UI Design System */
        :root {
            --primary-50: #E8F4FD;
            --primary-100: #D1E9FB;
            --primary-200: #A9D9F5;
            --primary-300: #7BC4F0;
            --primary-400: #4DAEEA;
            --primary-500: #2E96D5;
            --primary-600: #1E7AB8;
            --primary-700: #1A5F9A;
            --primary-800: #1A4975;
            --primary-900: #1A3A5C;
            
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;
            
            --primary: var(--primary-600);
            --background: var(--gray-50);
            --surface: #ffffff;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            
            --radius: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 32px 24px 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            margin: 16px;
            border-radius: var(--radius-lg);
            color: white;
        }

        .sidebar-logo i {
            font-size: 48px;
        }

        #sidebar a {
            color: var(--text-primary);
            margin: 10px 20px;
            padding: 14px 18px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sidebar a:hover {
            background: var(--primary-100);
            color: var(--primary);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
            transform: translateX(4px);
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 20px 32px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .returns-table {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--gray-50);
            padding: 16px 24px;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        tr:hover {
            background: var(--gray-50);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .status-verified {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--gray-500);
            color: white;
        }

        .btn-secondary:hover {
            background: var(--gray-600);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .message {
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                margin-left: 0;
                padding: 16px;
                margin-top: 60px;
            }
            
            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar.mobile-open {
                transform: translateX(0);
            }
            
            .topbar {
                left: 0;
                padding: 12px 16px;
            }
            
            .table-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }
            
            table {
                font-size: 14px;
            }
            
            th, td {
                padding: 12px 16px;
            }
        }

        /* Mobile menu toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fa fa-bars"></i>
    </button>

    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-cogs" style="font-size: 24px; color: var(--primary);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--text-primary); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--primary);"></i>
            <span id="user-name">Management User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-cogs"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="users.html"><i class="fa fa-users"></i> Manage Users</a>
        <a href="devices.html"><i class="fa fa-box"></i> Device Management</a>
        <a href="assign-device.html"><i class="fa fa-exchange-alt"></i> Assign Device</a>
        <a href="verify-return.html" class="active"><i class="fa fa-check-circle"></i> Verify Return</a>
        <a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </nav>

    <main class="container">
        <div class="header">
            <h1><i class="fa fa-check-circle"></i> Verify Device Returns</h1>
            <p>Review and verify device returns from users</p>
        </div>

        <div id="message" class="message"></div>

        <div class="returns-table">
            <div class="table-header">
                <h2><i class="fa fa-list"></i> Pending Returns</h2>
                <button class="btn btn-secondary" onclick="refreshReturns()">
                    <i class="fa fa-refresh"></i> Refresh
                </button>
            </div>
            
            <div id="returns-content">
                <!-- Returns will be populated here -->
            </div>
        </div>
    </main>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Management User', role: 'management', id: 1 };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'management') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 768 && 
                !sidebar.contains(event.target) && 
                !menuToggle.contains(event.target) &&
                sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccessMessage(message) {
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 3000);
        }

        function renderReturns() {
            const data = window.vitalwearDB.getData();
            const deviceLogs = data.device_logs || [];
            const devices = data.devices || [];
            const users = window.vitalwearDB.getUsers();
            
            // Get devices that have been returned but not verified
            const returnedDevices = deviceLogs.filter(log => 
                log.date_returned && !log.verified_return
            );
            
            const container = document.getElementById('returns-content');
            
            if (returnedDevices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-check-circle"></i>
                        <h3>No Pending Returns</h3>
                        <p>All device returns have been verified.</p>
                    </div>
                `;
                return;
            }
            
            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Device Serial</th>
                            <th>User</th>
                            <th>Role</th>
                            <th>Assigned Date</th>
                            <th>Return Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${returnedDevices.map(returnLog => {
                            const device = devices.find(d => d.id === returnLog.device_id);
                            const user = getUserById(returnLog.user_id, returnLog.user_role);
                            
                            return `
                                <tr>
                                    <td><strong>${device ? device.serial : 'Unknown'}</strong></td>
                                    <td>${user ? user.name : 'Unknown'}</td>
                                    <td>${returnLog.user_role.charAt(0).toUpperCase() + returnLog.user_role.slice(1)}</td>
                                    <td>${new Date(returnLog.date_assigned).toLocaleDateString()}</td>
                                    <td>${new Date(returnLog.date_returned).toLocaleDateString()}</td>
                                    <td><span class="status-badge status-pending">Pending Verification</span></td>
                                    <td>
                                        <button class="btn btn-success" onclick="verifyReturn(${returnLog.id}, ${returnLog.device_id})">
                                            <i class="fa fa-check"></i> Verify
                                        </button>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = tableHTML;
        }

        function getUserById(userId, role) {
            const users = window.vitalwearDB.getUsers();
            return users[role]?.find(u => u.id === parseInt(userId));
        }

        function verifyReturn(logId, deviceId) {
            if (confirm('Verify this device return? This will make the device available for reassignment.')) {
                const data = window.vitalwearDB.getData();
                const deviceLogs = data.device_logs;
                const devices = data.devices;
                
                // Update the device log
                const logIndex = deviceLogs.findIndex(log => log.id === logId);
                if (logIndex !== -1) {
                    deviceLogs[logIndex].verified_return = true;
                    
                    // Update device status to available
                    const deviceIndex = devices.findIndex(d => d.id === deviceId);
                    if (deviceIndex !== -1) {
                        devices[deviceIndex].status = 'available';
                        devices[deviceIndex].assigned_to = null;
                    }
                    
                    // Save data
                    window.vitalwearDB.saveData(data);
                    
                    // Log activity
                    const device = devices[deviceIndex];
                    const returnLog = deviceLogs[logIndex];
                    const user = getCurrentUser();
                    window.vitalwearDB.logActivity(user.name, 'management', `Verified return of device ${device?.serial}`);
                    
                    showSuccessMessage('Device return verified successfully!');
                    renderReturns();
                } else {
                    showMessage('Failed to verify return', 'error');
                }
            }
        }

        function refreshReturns() {
            renderReturns();
            showMessage('Returns refreshed', 'success');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            renderReturns();
        });
    </script>
</body>
</html>
