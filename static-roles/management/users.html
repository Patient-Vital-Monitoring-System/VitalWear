<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-50: #E8F4FD;
            --primary-100: #D1E9FB;
            --primary-200: #A9D9F5;
            --primary-300: #7BC4F0;
            --primary-400: #4DAEEA;
            --primary-500: #2E96D5;
            --primary-600: #1E7AB8;
            --primary-700: #1A5F9A;
            --primary-800: #1A4975;
            --primary-900: #1A3A5C;
            
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;
            
            --primary: var(--primary-600);
            --background: var(--gray-50);
            --surface: #ffffff;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            
            --radius: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 32px 24px 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            margin: 16px;
            border-radius: var(--radius-lg);
            color: white;
        }

        .sidebar-logo i {
            font-size: 48px;
        }

        #sidebar a {
            color: var(--text-primary);
            margin: 10px 20px;
            padding: 14px 18px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #sidebar a:hover {
            background: var(--primary-100);
            color: var(--primary);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 20px 32px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--gray-600);
            color: white;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .user-card {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .user-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
        }

        .user-info h3 {
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }

        .user-info p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .user-role {
            display: inline-block;
            padding: 4px 12px;
            background: var(--primary-100);
            color: var(--primary);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 8px 0;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: var(--surface);
            margin: 5% auto;
            padding: 32px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .user-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-cogs" style="font-size: 24px; color: var(--primary);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--primary); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--primary);"></i>
            <span id="user-name">Management User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="users.html" class="active"><i class="fa fa-users"></i> Manage Users</a>
        <a href="devices.html"><i class="fa fa-box"></i> Device Management</a>
        <a href="assign-device.html"><i class="fa fa-exchange-alt"></i> Assign Device</a>
        <a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="#" onclick="logout()" class="btn btn-secondary">Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <h1><i class="fa fa-users"></i> User Management</h1>
            <p>Manage all user accounts across different roles</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('management')">Management</button>
            <button class="tab" onclick="switchTab('rescuer')">Rescuers</button>
            <button class="tab" onclick="switchTab('responder')">Responders</button>
        </div>

        <div id="management-tab" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="color: var(--text-primary);">Management Users</h2>
                <button class="btn btn-primary" onclick="openAddUserModal('management')">
                    <i class="fa fa-plus"></i> Add Management User
                </button>
            </div>
            <div class="user-grid" id="management-users">
                <!-- Management users will be populated here -->
            </div>
        </div>

        <div id="rescuer-tab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="color: var(--text-primary);">Rescuer Users</h2>
                <button class="btn btn-primary" onclick="openAddUserModal('rescuer')">
                    <i class="fa fa-plus"></i> Add Rescuer
                </button>
            </div>
            <div class="user-grid" id="rescuer-users">
                <!-- Rescuer users will be populated here -->
            </div>
        </div>

        <div id="responder-tab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="color: var(--text-primary);">Responder Users</h2>
                <button class="btn btn-primary" onclick="openAddUserModal('responder')">
                    <i class="fa fa-plus"></i> Add Responder
                </button>
            </div>
            <div class="user-grid" id="responder-users">
                <!-- Responder users will be populated here -->
            </div>
        </div>
    </main>

    <!-- Add User Modal -->
    <div id="add-user-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 24px;">Add New User</h2>
            <form id="add-user-form">
                <div class="form-group">
                    <label for="user-name">Full Name</label>
                    <input type="text" id="user-name" required>
                </div>
                <div class="form-group">
                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" required>
                </div>
                <div class="form-group">
                    <label for="user-role">Role</label>
                    <select id="user-role" required>
                        <option value="management">Management</option>
                        <option value="rescuer">Rescuer</option>
                        <option value="responder">Responder</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Management User', role: 'management' };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'management') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        function renderUsers() {
            const users = window.vitalwearDB.getUsers();
            
            // Render management users
            const managementContainer = document.getElementById('management-users');
            managementContainer.innerHTML = users.management.map(user => createUserCard(user, 'management')).join('');
            
            // Render rescuer users
            const rescuerContainer = document.getElementById('rescuer-users');
            rescuerContainer.innerHTML = users.rescuer.map(user => createUserCard(user, 'rescuer')).join('');
            
            // Render responder users
            const responderContainer = document.getElementById('responder-users');
            responderContainer.innerHTML = users.responder.map(user => createUserCard(user, 'responder')).join('');
        }

        function createUserCard(user, role) {
            return `
                <div class="user-card">
                    <div class="user-header">
                        <div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>
                        <div class="user-info">
                            <h3>${user.name}</h3>
                            <p>${user.email}</p>
                            <span class="user-role">${role.charAt(0).toUpperCase() + role.slice(1)}</span>
                        </div>
                    </div>
                    <div class="user-actions">
                        <button class="btn btn-secondary" onclick="editUser(${user.id}, '${role}')">
                            <i class="fa fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-danger" onclick="deleteUser(${user.id}, '${role}')">
                            <i class="fa fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
        }

        function openAddUserModal(role = '') {
            document.getElementById('add-user-modal').style.display = 'block';
            if (role) {
                document.getElementById('user-role').value = role;
            }
        }

        function closeModal() {
            document.getElementById('add-user-modal').style.display = 'none';
            document.getElementById('add-user-form').reset();
        }

        function addUser(event) {
            event.preventDefault();
            
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const role = document.getElementById('user-role').value;
            
            console.log('Adding user:', { name, email, role }); // Debug log
            
            const newUser = window.vitalwearDB.addUser({
                name: name,
                email: email,
                role: role
            });
            
            console.log('New user added:', newUser); // Debug log
            
            if (newUser) {
                // Show success message
                showSuccessMessage(`User "${name}" added successfully as ${role}!`);
                
                // Close modal and reset form
                closeModal();
                
                // Automatically refresh the users table
                renderUsers();
                
                // Switch to the appropriate tab to show the new user
                switchTab(role);
                
                // Verify it's saved to localStorage
                const savedData = localStorage.getItem('vitalwear_data');
                console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
            } else {
                alert('Failed to add user');
            }
        }

        function editUser(userId, role) {
            const user = window.vitalwearDB.getUserById(userId, role);
            if (user) {
                document.getElementById('user-name').value = user.name;
                document.getElementById('user-email').value = user.email;
                document.getElementById('user-role').value = role;
                
                // Change form to update mode
                const form = document.getElementById('add-user-form');
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.textContent = 'Update User';
                submitBtn.onclick = function(e) {
                    e.preventDefault();
                    updateUser(userId, role);
                };
                
                openAddUserModal();
            }
        }

        function updateUser(userId, role) {
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            
            console.log('Updating user:', { userId, role, name, email }); // Debug log
            
            const updatedUser = window.vitalwearDB.updateUser(userId, role, {
                name: name,
                email: email
            });
            
            console.log('User updated:', updatedUser); // Debug log
            
            if (updatedUser) {
                showSuccessMessage(`User "${name}" updated successfully!`);
                closeModal();
                renderUsers();
                
                // Verify it's saved to localStorage
                const savedData = localStorage.getItem('vitalwear_data');
                console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
                
                // Reset form back to add mode
                const form = document.getElementById('add-user-form');
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.textContent = 'Add User';
                submitBtn.onclick = addUser;
            } else {
                alert('Failed to update user');
            }
        }

        function deleteUser(userId, role) {
            if (confirm('Are you sure you want to delete this user?')) {
                console.log('Deleting user:', { userId, role }); // Debug log
                
                const success = window.vitalwearDB.deleteUser(userId, role);
                
                console.log('User deleted:', success); // Debug log
                
                if (success) {
                    showSuccessMessage('User deleted successfully!');
                    renderUsers();
                    
                    // Verify it's saved to localStorage
                    const savedData = localStorage.getItem('vitalwear_data');
                    console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
                } else {
                    alert('Failed to delete user');
                }
            }
        }

        function showSuccessMessage(message) {
            // Create success message element
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            // Remove after 3 seconds
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 3000);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            renderUsers();
            
            // Setup form submission
            document.getElementById('add-user-form').addEventListener('submit', addUser);
            
            // Close modal when clicking outside
            window.onclick = function(event) {
                const modal = document.getElementById('add-user-modal');
                if (event.target === modal) {
                    closeModal();
                }
            }
        });
    </script>
</body>
</html>
