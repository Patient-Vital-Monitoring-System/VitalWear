<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Management - VitalWear</title>
    <script src="https://kit.fontawesome.com/96e37b53f1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-50: #E8F4FD;
            --primary-100: #D1E9FB;
            --primary-200: #A9D9F5;
            --primary-300: #7BC4F0;
            --primary-400: #4DAEEA;
            --primary-500: #2E96D5;
            --primary-600: #1E7AB8;
            --primary-700: #1A5F9A;
            --primary-800: #1A4975;
            --primary-900: #1A3A5C;
            
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;
            
            --primary: var(--primary-600);
            --background: var(--gray-50);
            --surface: #ffffff;
            --text-primary: var(--gray-900);
            --text-secondary: var(--gray-600);
            --border: var(--gray-200);
            
            --radius: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 32px 24px 24px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            margin: 16px;
            border-radius: var(--radius-lg);
            color: white;
        }

        .sidebar-logo i {
            font-size: 48px;
        }

        #sidebar a {
            color: var(--text-primary);
            margin: 10px 20px;
            padding: 14px 18px;
            border-radius: var(--radius);
            transition: all 0.2s ease;
            border: none;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #sidebar a:hover {
            background: var(--primary-100);
            color: var(--primary);
            transform: translateX(4px);
        }

        #sidebar a.active {
            background: var(--primary);
            color: white;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 280px;
            right: 0;
            background: var(--surface);
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 20px 32px;
            font-weight: 600;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
            margin-left: 280px;
            margin-top: 80px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card h3 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-700) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--gray-600);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .device-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .device-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .device-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-50) 0%, var(--primary-100) 100%);
            border-bottom: 1px solid var(--border);
        }

        .device-header h3 {
            margin: 0 0 8px 0;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .device-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-available {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-assigned {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .status-maintenance {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
        }

        .device-body {
            padding: 20px;
        }

        .device-info {
            margin-bottom: 16px;
        }

        .device-info p {
            margin: 4px 0;
            color: var(--text-secondary);
        }

        .device-info strong {
            color: var(--text-primary);
        }

        .device-actions {
            display: flex;
            gap: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: var(--surface);
            margin: 5% auto;
            padding: 32px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .device-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa fa-cogs" style="font-size: 24px; color: var(--primary);"></i>
            <span style="font-size: 18px; font-weight: 700;">VitalWear</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; color: var(--primary); font-weight: 500;">
            <i class="fa fa-user-circle" style="font-size: 20px; color: var(--primary);"></i>
            <span id="user-name">Management User</span>
        </div>
    </header>

    <nav id="sidebar">
        <div class="sidebar-logo">
            <i class="fa fa-heart-pulse"></i>
        </div>
        <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="users.html"><i class="fa fa-users"></i> Manage Users</a>
        <a href="devices.html" class="active"><i class="fa fa-box"></i> Device Management</a>
        <a href="assign-device.html"><i class="fa fa-exchange-alt"></i> Assign Device</a>
        <a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
        <a href="#" onclick="logout()" class="btn btn-secondary">Logout</a>
    </nav>

    <main class="container">
        <header class="header">
            <h1><i class="fa fa-box"></i> Device Management</h1>
            <p>Register and monitor all VitalWear devices</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Devices</h3>
                <div class="stat-number" id="total-devices">0</div>
            </div>
            <div class="stat-card">
                <h3>Available</h3>
                <div class="stat-number" id="available-devices">0</div>
            </div>
            <div class="stat-card">
                <h3>Assigned</h3>
                <div class="stat-number" id="assigned-devices">0</div>
            </div>
            <div class="stat-card">
                <h3>Maintenance</h3>
                <div class="stat-number" id="maintenance-devices">0</div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="color: var(--text-primary);">All Devices</h2>
            <button class="btn btn-primary" onclick="openAddDeviceModal()">
                <i class="fa fa-plus"></i> Register New Device
            </button>
        </div>

        <div class="device-grid" id="device-grid">
            <!-- Devices will be populated here -->
        </div>
    </main>

    <!-- Add Device Modal -->
    <div id="add-device-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 24px;">Register New Device</h2>
            <form id="add-device-form">
                <div class="form-group">
                    <label for="device-serial">Serial Number</label>
                    <input type="text" id="device-serial" required placeholder="e.g., VW001">
                </div>
                <div class="form-group">
                    <label for="device-status">Status</label>
                    <select id="device-status" required>
                        <option value="available">Available</option>
                        <option value="assigned">Assigned</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Register Device</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/screen-detection.js"></script>
    <script>
        function getCurrentUser() {
            const role = sessionStorage.getItem('current_role');
            return window.vitalwearDB.getUsers(role)[0] || { name: 'Management User', role: 'management' };
        }

        function checkAuth() {
            const role = sessionStorage.getItem('current_role');
            if (role !== 'management') {
                window.location.href = '../index.html';
                return;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        function updateStats() {
            const stats = window.vitalwearDB.getStats();
            
            document.getElementById('total-devices').textContent = stats.totalDevices;
            document.getElementById('available-devices').textContent = stats.availableDevices;
            document.getElementById('assigned-devices').textContent = stats.assignedDevices;
            document.getElementById('maintenance-devices').textContent = stats.maintenanceDevices;
        }

        function renderDevices() {
            const devices = window.vitalwearDB.getDevices();
            const container = document.getElementById('device-grid');
            
            if (devices.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-secondary);">
                        <i class="fa fa-box" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
                        <h3 style="color: var(--text-primary); margin-bottom: 8px;">No Devices Registered</h3>
                        <p>Start by registering your first VitalWear device.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = devices.map(device => createDeviceCard(device)).join('');
        }

        function createDeviceCard(device) {
            const assignedUser = device.assigned_to ? getAssignedUser(device.assigned_to) : null;
            
            return `
                <div class="device-card">
                    <div class="device-header">
                        <h3><i class="fa fa-box"></i> ${device.serial}</h3>
                        <span class="device-status status-${device.status}">${device.status.charAt(0).toUpperCase() + device.status.slice(1)}</span>
                    </div>
                    <div class="device-body">
                        <div class="device-info">
                            <p><strong>Status:</strong> ${device.status.charAt(0).toUpperCase() + device.status.slice(1)}</p>
                            <p><strong>Assigned to:</strong> ${assignedUser ? assignedUser.name : 'Unassigned'}</p>
                            <p><strong>Registered:</strong> ${new Date(device.created_at).toLocaleDateString()}</p>
                        </div>
                        <div class="device-actions">
                            ${device.status === 'available' ? 
                                `<button class="btn btn-primary" onclick="assignDevice(${device.id})">
                                    <i class="fa fa-user-plus"></i> Assign
                                </button>` : ''
                            }
                            ${device.status === 'assigned' ? 
                                `<button class="btn btn-warning" onclick="returnDevice(${device.id})">
                                    <i class="fa fa-undo"></i> Return
                                </button>` : ''
                            }
                            <button class="btn btn-secondary" onclick="editDevice(${device.id})">
                                <i class="fa fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-danger" onclick="deleteDevice(${device.id})">
                                <i class="fa fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getAssignedUser(userId) {
            const allUsers = window.vitalwearDB.getUsers();
            const users = [
                ...allUsers.management,
                ...allUsers.rescuer,
                ...allUsers.responder
            ];
            return users.find(u => u.id === userId);
        }

        function openAddDeviceModal() {
            document.getElementById('add-device-modal').style.display = 'block';
            // Generate next serial number
            const devices = window.vitalwearDB.getDevices();
            const nextNumber = devices.length + 1;
            document.getElementById('device-serial').value = `VW${String(nextNumber).padStart(3, '0')}`;
        }

        function closeModal() {
            document.getElementById('add-device-modal').style.display = 'none';
            document.getElementById('add-device-form').reset();
        }

        function addDevice(event) {
            event.preventDefault();
            
            const serial = document.getElementById('device-serial').value;
            const status = document.getElementById('device-status').value;
            
            console.log('Adding device:', { serial, status }); // Debug log
            
            const newDevice = window.vitalwearDB.addDevice({
                serial: serial,
                status: status
            });
            
            console.log('New device added:', newDevice); // Debug log
            
            if (newDevice) {
                showSuccessMessage(`Device "${serial}" registered successfully!`);
                closeModal();
                renderDevices();
                updateStats();
                
                // Verify it's saved to localStorage
                const savedData = localStorage.getItem('vitalwear_data');
                console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
            } else {
                alert('Failed to register device');
            }
        }

        function assignDevice(deviceId) {
            // For demo purposes, assign to first available user
            const users = window.vitalwearDB.getUsers();
            const firstUser = users.rescuer[0] || users.responder[0] || users.management[0];
            
            if (firstUser && confirm(`Assign device to ${firstUser.name}?`)) {
                console.log('Assigning device:', { deviceId, userId: firstUser.id, userRole: firstUser.role }); // Debug log
                
                const success = window.vitalwearDB.assignDevice(deviceId, firstUser.id, firstUser.role);
                
                console.log('Device assigned:', success); // Debug log
                
                if (success) {
                    showSuccessMessage(`Device assigned to ${firstUser.name}!`);
                    renderDevices();
                    updateStats();
                    
                    // Verify it's saved to localStorage
                    const savedData = localStorage.getItem('vitalwear_data');
                    console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
                } else {
                    alert('Failed to assign device');
                }
            }
        }

        function returnDevice(deviceId) {
            if (confirm('Return this device to available status?')) {
                console.log('Returning device:', deviceId); // Debug log
                
                const success = window.vitalwearDB.returnDevice(deviceId);
                
                console.log('Device returned:', success); // Debug log
                
                if (success) {
                    showSuccessMessage('Device returned successfully!');
                    renderDevices();
                    updateStats();
                    
                    // Verify it's saved to localStorage
                    const savedData = localStorage.getItem('vitalwear_data');
                    console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
                } else {
                    alert('Failed to return device');
                }
            }
        }

        function editDevice(deviceId) {
            const device = window.vitalwearDB.getDeviceById(deviceId);
            if (device) {
                document.getElementById('device-serial').value = device.serial;
                document.getElementById('device-status').value = device.status;
                
                // Change form to update mode
                const form = document.getElementById('add-device-form');
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.textContent = 'Update Device';
                submitBtn.onclick = function(e) {
                    e.preventDefault();
                    updateDevice(deviceId);
                };
                
                openAddDeviceModal();
            }
        }

        function updateDevice(deviceId) {
            const serial = document.getElementById('device-serial').value;
            const status = document.getElementById('device-status').value;
            
            console.log('Updating device:', { deviceId, serial, status }); // Debug log
            
            const updatedDevice = window.vitalwearDB.updateDevice(deviceId, {
                serial: serial,
                status: status
            });
            
            console.log('Device updated:', updatedDevice); // Debug log
            
            if (updatedDevice) {
                showSuccessMessage(`Device "${serial}" updated successfully!`);
                closeModal();
                renderDevices();
                updateStats();
                
                // Verify it's saved to localStorage
                const savedData = localStorage.getItem('vitalwear_data');
                console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
                
                // Reset form back to add mode
                const form = document.getElementById('add-device-form');
                const submitBtn = form.querySelector('button[type="submit"]');
                submitBtn.textContent = 'Register Device';
                submitBtn.onclick = addDevice;
            } else {
                alert('Failed to update device');
            }
        }

        function deleteDevice(deviceId) {
            if (confirm('Are you sure you want to delete this device?')) {
                console.log('Deleting device:', deviceId); // Debug log
                
                const success = window.vitalwearDB.deleteDevice(deviceId);
                
                console.log('Device deleted:', success); // Debug log
                
                if (success) {
                    showSuccessMessage('Device deleted successfully!');
                    renderDevices();
                    updateStats();
                    
                    // Verify it's saved to localStorage
                    const savedData = localStorage.getItem('vitalwear_data');
                    console.log('Data saved to localStorage:', savedData ? 'Yes' : 'No');
                } else {
                    alert('Failed to delete device');
                }
            }
        }

        function showSuccessMessage(message) {
            // Create success message element
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #10B981;
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                z-index: 10000;
                font-weight: 500;
            `;
            successDiv.textContent = message;
            
            document.body.appendChild(successDiv);
            
            // Remove after 3 seconds
            setTimeout(() => {
                if (successDiv.parentNode) {
                    successDiv.parentNode.removeChild(successDiv);
                }
            }, 3000);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check if screen is too small for management
            if (window.screenDetector && window.screenDetector.disableForSmallScreens()) {
                console.warn('Management devices page disabled due to small screen');
                return;
            }
            
            checkAuth();
            
            const user = getCurrentUser();
            document.getElementById('user-name').textContent = user.name;
            
            updateStats();
            renderDevices();
            
            // Setup form submission
            document.getElementById('add-device-form').addEventListener('submit', addDevice);
            
            // Close modal when clicking outside
            window.onclick = function(event) {
                const modal = document.getElementById('add-device-modal');
                if (event.target === modal) {
                    closeModal();
                }
            }
        });
    </script>
</body>
</html>
