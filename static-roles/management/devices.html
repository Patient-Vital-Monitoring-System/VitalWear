<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devices · VitalWear</title>
  <script src="https://kit.fontawesome.com/96e37b53f1.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0F1F3D;--navy-mid:#1B3A6B;--sky:#2E96D5;--sky-light:#E8F4FD;--teal:#0ABFBC;--teal-light:#E0FAF9;--white:#FFFFFF;--surface:#F4F7FB;--card:#FFFFFF;--border:#DDE3EE;--text-1:#0F1F3D;--text-2:#4A5E82;--text-3:#8A9DBF;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--sidebar-w:272px;--topbar-h:68px;--radius:10px;--radius-lg:16px;--radius-xl:22px;--shadow-sm:0 1px 4px rgba(15,31,61,0.07);--shadow:0 4px 16px rgba(15,31,61,0.09);--shadow-lg:0 12px 40px rgba(15,31,61,0.14);--transition:200ms cubic-bezier(.4,0,.2,1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text-1);-webkit-font-smoothing:antialiased}
    #sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--navy);display:flex;flex-direction:column;z-index:200;overflow-y:auto;overflow-x:hidden;transition:transform var(--transition)}
    .sb-brand{display:flex;align-items:center;gap:12px;padding:26px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
    .sb-brand-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--sky),var(--teal));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
    .sb-brand-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;color:#fff;line-height:1}
    .sb-brand-sub{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
    .sb-section-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:20px 24px 8px}
    .sb-nav{padding:0 12px}
    .sb-nav a{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius);margin-bottom:2px;color:rgba(255,255,255,0.6);text-decoration:none;font-size:14px;font-weight:500;transition:background var(--transition),color var(--transition),transform var(--transition);position:relative}
    .sb-nav a i{width:18px;text-align:center;font-size:14px;flex-shrink:0}
    .sb-nav a:hover{background:rgba(255,255,255,0.07);color:#fff;transform:translateX(3px)}
    .sb-nav a.active{background:linear-gradient(90deg,rgba(46,150,213,0.25),rgba(10,191,188,0.15));color:#fff}
    .sb-nav a.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:60%;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,var(--sky),var(--teal))}
    .sb-footer{margin-top:auto;padding:20px;border-top:1px solid rgba(255,255,255,0.07)}
    .sb-logout{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:rgba(239,68,68,0.12);color:rgba(239,68,68,0.8);border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;transition:background var(--transition),color var(--transition);font-family:'DM Sans',sans-serif}
    .sb-logout:hover{background:rgba(239,68,68,0.22);color:#EF4444}
    #topbar{position:fixed;left:var(--sidebar-w);top:0;right:0;height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100;box-shadow:var(--shadow-sm)}
    .tb-left{display:flex;align-items:center;gap:14px}
    .tb-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:17px;color:var(--text-1)}
    .tb-breadcrumb{font-size:13px;color:var(--text-3)}
    .tb-right{display:flex;align-items:center;gap:16px}
    .tb-chip{display:flex;align-items:center;gap:7px;background:var(--sky-light);border:1px solid rgba(46,150,213,0.2);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--sky)}
    .tb-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0}
    .tb-user{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:6px 14px 6px 7px}
    .tb-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--sky),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
    .tb-username{font-size:13px;font-weight:600;color:var(--text-1)}
    .tb-mobile-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px;font-size:20px;color:var(--text-1)}
    #main{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);min-height:calc(100vh - var(--topbar-h));padding:32px}
    .page-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,#1e4a8a 100%);border-radius:var(--radius-xl);padding:36px 40px;margin-bottom:28px;position:relative;overflow:hidden}
    .page-hero::before{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(46,150,213,0.12)}
    .page-hero::after{content:'';position:absolute;right:80px;bottom:-80px;width:180px;height:180px;border-radius:50%;background:rgba(10,191,188,0.1)}
    .page-hero h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:26px;color:#fff;margin-bottom:6px;position:relative;z-index:1}
    .page-hero p{color:rgba(255,255,255,0.65);font-size:14px;position:relative;z-index:1}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition),transform var(--transition)}
    .stat-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
    .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
    .stat-label{font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
    .stat-num{font-family:'Outfit',sans-serif;font-weight:800;font-size:28px;color:var(--text-1);line-height:1}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden}
    .card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;gap:10px}
    .card-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;color:var(--text-1);display:flex;align-items:center;gap:9px}
    .card-title i{color:var(--sky)}
    .card-body{padding:24px}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
    .badge-success{background:rgba(16,185,129,0.12);color:#059669}
    .badge-warning{background:rgba(245,158,11,0.12);color:#D97706}
    .badge-danger{background:rgba(239,68,68,0.12);color:#DC2626}
    .badge-sky{background:rgba(46,150,213,0.12);color:var(--sky)}
    .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all var(--transition);text-decoration:none;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--sky),#1E7AB8);color:#fff;box-shadow:0 2px 8px rgba(46,150,213,0.35)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(46,150,213,0.45)}
    .btn-ghost{background:transparent;color:var(--text-2);border:1.5px solid var(--border)}
    .btn-ghost:hover{border-color:var(--sky);color:var(--sky);background:var(--sky-light)}
    .btn-danger-outline{background:transparent;color:var(--danger);border:1.5px solid rgba(239,68,68,0.3)}
    .btn-danger-outline:hover{background:rgba(239,68,68,0.07);border-color:var(--danger)}
    .btn-sm{padding:7px 14px;font-size:12px}
    .form-group{margin-bottom:18px}
    .form-label{display:block;margin-bottom:7px;font-size:13px;font-weight:600;color:var(--text-1)}
    .form-control{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text-1);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color var(--transition),box-shadow var(--transition)}
    .form-control:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px rgba(46,150,213,0.12)}
    .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .modal-backdrop{display:none;position:fixed;inset:0;z-index:500;background:rgba(15,31,61,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
    .modal-backdrop.open{display:flex}
    .modal{background:var(--white);border-radius:var(--radius-xl);padding:32px;width:94%;max-width:480px;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
    @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .modal-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;color:var(--text-1)}
    .modal-close{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2)}
    .modal-close:hover{background:var(--border)}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
    #toast-container{position:fixed;top:84px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{background:var(--navy);color:#fff;padding:13px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;min-width:260px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:toastIn .25s ease;pointer-events:all}
    .toast-success{border-left:3px solid var(--success)}.toast-danger{border-left:3px solid var(--danger)}.toast-info{border-left:3px solid var(--sky)}
    @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
    @keyframes toastOut{to{opacity:0;transform:translateX(20px)}}
    .overlay{display:none;position:fixed;inset:0;z-index:190;background:rgba(15,31,61,0.45)}
    /* Filter tabs */
    .filter-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:20px}
    .filter-btn{padding:7px 16px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--white);color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition)}
    .filter-btn:hover{border-color:var(--sky);color:var(--sky)}
    .filter-btn.active{background:var(--sky);color:#fff;border-color:var(--sky);box-shadow:0 2px 8px rgba(46,150,213,0.3)}
    /* Device cards */
    .device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .device-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow var(--transition),transform var(--transition)}
    .device-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
    .device-card-top{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .device-serial{font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;color:var(--navy)}
    .device-card-body{padding:18px 20px}
    .di-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
    .di-label{color:var(--text-3);font-weight:500}
    .di-value{color:var(--text-1);font-weight:600}
    .device-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
    .empty-state{text-align:center;padding:52px 24px;color:var(--text-3)}
    .empty-state i{font-size:44px;margin-bottom:14px;display:block;opacity:.4}
    .empty-state h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;color:var(--text-2);margin-bottom:6px}
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
    @media(max-width:900px){:root{--sidebar-w:0px}#sidebar{transform:translateX(-272px);width:272px}#sidebar.open{transform:translateX(0)}.overlay.show{display:block}#main{margin-left:0;padding:20px 16px}.tb-mobile-toggle{display:block}.device-grid{grid-template-columns:1fr}.form-grid-2{grid-template-columns:1fr}.page-hero{padding:26px 22px}.page-hero h1{font-size:20px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div id="toast-container"></div>

<nav id="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-icon"><i class="fa fa-heart-pulse"></i></div>
    <div><div class="sb-brand-name">VitalWear</div><div class="sb-brand-sub">Management</div></div>
  </div>
  <div class="sb-section-label">Main Menu</div>
  <div class="sb-nav">
    <a href="dashboard.html"><i class="fa fa-gauge"></i> Dashboard</a>
    <a href="users.html"><i class="fa fa-users"></i> Manage Users</a>
    <a href="devices.html" class="active"><i class="fa fa-microchip"></i> Devices</a>
    <a href="assign-device.html"><i class="fa fa-link"></i> Assign Device</a>
    <a href="verify-return.html"><i class="fa fa-rotate-left"></i> Verify Return</a>
    <a href="reports.html"><i class="fa fa-chart-bar"></i> Reports</a>
  </div>
  <div class="sb-footer"><button class="sb-logout" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Sign Out</button></div>
</nav>

<header id="topbar">
  <div class="tb-left">
    <button class="tb-mobile-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
    <div><div class="tb-title">Device Management</div><div class="tb-breadcrumb">Register &amp; monitor all devices</div></div>
  </div>
  <div class="tb-right">
    <div class="tb-chip"><span class="dot"></span>System Online</div>
    <div class="tb-user"><div class="tb-avatar" id="tb-avatar">M</div><span class="tb-username" id="tb-username">Loading…</span></div>
  </div>
</header>

<main id="main">
  <div class="page-hero">
    <h1><i class="fa fa-microchip" style="opacity:.7"></i> &nbsp;Device Management</h1>
    <p>Register, monitor, and manage all VitalWear devices</p>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid"></div>

  <!-- Device list -->
  <div class="card">
    <div class="card-header">
      <span class="card-title"><i class="fa fa-microchip"></i> All Devices</span>
      <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="fa fa-plus"></i> Register Device</button>
    </div>
    <div class="card-body">
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('available',this)">Available</button>
        <button class="filter-btn" onclick="setFilter('assigned',this)">Assigned</button>
        <button class="filter-btn" onclick="setFilter('maintenance',this)">Maintenance</button>
      </div>
      <div class="device-grid" id="device-grid"></div>
    </div>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-backdrop" id="modal-device">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-device-title">Register Device</span>
      <button class="modal-close" onclick="closeModal('modal-device')"><i class="fa fa-xmark"></i></button>
    </div>
    <div class="form-group">
      <label class="form-label">Serial Number *</label>
      <input class="form-control" id="d-serial" placeholder="e.g. VW-001"/>
    </div>
    <div class="form-group">
      <label class="form-label">Device Name</label>
      <input class="form-control" id="d-name" placeholder="Friendly name (optional)"/>
    </div>
    <div class="form-grid-2">
      <div class="form-group">
        <label class="form-label">Type</label>
        <input class="form-control" id="d-type" placeholder="e.g. Wearable"/>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="d-status">
          <option value="available">Available</option>
          <option value="assigned">Assigned</option>
          <option value="maintenance">Maintenance</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-device')">Cancel</button>
      <button class="btn btn-primary" id="d-submit-btn" onclick="submitDevice()">Register</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-backdrop" id="modal-del">
  <div class="modal" style="max-width:400px">
    <div style="text-align:center;padding:8px 0 20px">
      <div style="width:60px;height:60px;border-radius:50%;background:rgba(239,68,68,0.1);color:var(--danger);font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><i class="fa fa-trash"></i></div>
      <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;color:var(--text-1);margin-bottom:8px">Delete Device?</div>
      <div style="font-size:14px;color:var(--text-2)" id="del-msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-del')">Cancel</button>
      <button class="btn" style="background:var(--danger);color:#fff" id="del-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<script src="../js/database.js"></script>
<script src="../js/screen-detection.js"></script>
<script>
  let editingDeviceId=null, currentFilter='all';

  function checkAuth(){if(sessionStorage.getItem('current_role')!=='management')window.location.href='../index.html'}
  function logout(){sessionStorage.clear();window.location.href='../index.html'}
  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')}
  function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

  function toast(msg,type='info'){
    const t=document.createElement('div');t.className=`toast toast-${type}`;
    const icons={success:'fa-circle-check',danger:'fa-circle-exclamation',info:'fa-circle-info'};
    t.innerHTML=`<i class="fa ${icons[type]||icons.info}"></i> ${msg}`;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(()=>{t.style.animation='toastOut .3s ease forwards';setTimeout(()=>t.remove(),300)},3200);
  }

  function setFilter(f,btn){
    currentFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderDevices();
  }

  const statusMap={
    available:{badge:'badge-success',label:'Available'},
    assigned:{badge:'badge-warning',label:'Assigned'},
    maintenance:{badge:'badge-danger',label:'Maintenance'},
    inactive:{badge:'',label:'Inactive',style:'background:rgba(138,157,191,0.12);color:#6B7280'}
  };

  function renderStats(){
    const s=window.vitalwearDB.getStats();
    const cards=[
      {label:'Total',val:s.totalDevices,icon:'fa-microchip',clr:'#2E96D5',bg:'rgba(46,150,213,0.1)'},
      {label:'Available',val:s.availableDevices,icon:'fa-circle-check',clr:'#10B981',bg:'rgba(16,185,129,0.1)'},
      {label:'Assigned',val:s.assignedDevices,icon:'fa-link',clr:'#F59E0B',bg:'rgba(245,158,11,0.1)'},
      {label:'Maintenance',val:s.maintenanceDevices,icon:'fa-wrench',clr:'#EF4444',bg:'rgba(239,68,68,0.1)'},
    ];
    document.getElementById('stats-grid').innerHTML=cards.map(c=>`
      <div class="stat-card">
        <div class="stat-icon" style="background:${c.bg};color:${c.clr}"><i class="fa ${c.icon}"></i></div>
        <div><div class="stat-label">${c.label}</div><div class="stat-num">${c.val}</div></div>
      </div>`).join('');
  }

  function getAssignedResponder(device){
    try{
      const users=window.vitalwearDB.getUsers();
      const responders=users.responder||[];
      return responders.find(r=>r.assigned_device===device.dev_id||r.assigned_device===device.id)||null;
    }catch{return null}
  }

  function renderDevices(){
    let devices=window.vitalwearDB.getDevices();
    if(currentFilter!=='all') devices=devices.filter(d=>d.status===currentFilter||d.dev_status===currentFilter);
    const el=document.getElementById('device-grid');
    if(!devices.length){
      el.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><i class="fa fa-microchip"></i><h3>No devices found</h3><p>${currentFilter==='all'?'Register your first device using the button above.':`No ${currentFilter} devices.`}</p></div>`;
      return;
    }
    el.innerHTML=devices.map(d=>{
      const status=d.dev_status||d.status||'available';
      const serial=d.dev_serial||d.serial||'—';
      const name=d.dev_name||d.name||'';
      const type=d.dev_type||d.type||'—';
      const id=d.dev_id||d.id;
      const sm=statusMap[status]||{badge:'',label:status,style:''};
      const responder=getAssignedResponder(d);
      return `
        <div class="device-card">
          <div class="device-card-top">
            <div>
              <div class="device-serial">${serial}</div>
              ${name?`<div style="font-size:12px;color:var(--text-3);margin-top:2px">${name}</div>`:''}
            </div>
            <span class="badge ${sm.badge}" ${sm.style?`style="${sm.style}"`:''}>${sm.label}</span>
          </div>
          <div class="device-card-body">
            <div class="di-row"><span class="di-label">ID</span><span class="di-value">#${id}</span></div>
            <div class="di-row"><span class="di-label">Type</span><span class="di-value">${type}</span></div>
            <div class="di-row"><span class="di-label">Assigned to</span><span class="di-value">${responder?responder.resp_name||responder.name:'—'}</span></div>
            <div class="device-actions">
              <button class="btn btn-ghost btn-sm" onclick="openEdit(${id})"><i class="fa fa-pen"></i> Edit</button>
              <button class="btn btn-danger-outline btn-sm" onclick="confirmDelete(${id},'${serial}')"><i class="fa fa-trash"></i></button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function openAdd(){
    editingDeviceId=null;
    document.getElementById('modal-device-title').textContent='Register New Device';
    document.getElementById('d-submit-btn').textContent='Register';
    ['d-serial','d-name','d-type'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('d-status').value='available';
    openModal('modal-device');
  }

  function openEdit(id){
    const devices=window.vitalwearDB.getDevices();
    const d=devices.find(x=>(x.dev_id||x.id)===id);
    if(!d)return;
    editingDeviceId=id;
    document.getElementById('modal-device-title').textContent='Edit Device';
    document.getElementById('d-submit-btn').textContent='Save Changes';
    document.getElementById('d-serial').value=d.dev_serial||d.serial||'';
    document.getElementById('d-name').value=d.dev_name||d.name||'';
    document.getElementById('d-type').value=d.dev_type||d.type||'';
    document.getElementById('d-status').value=d.dev_status||d.status||'available';
    openModal('modal-device');
  }

  function submitDevice(){
    const serial=document.getElementById('d-serial').value.trim();
    const name=document.getElementById('d-name').value.trim();
    const type=document.getElementById('d-type').value.trim();
    const status=document.getElementById('d-status').value;
    if(!serial){toast('Serial number is required.','danger');return}
    if(editingDeviceId){
      const r=window.vitalwearDB.updateDevice(editingDeviceId,{serial,dev_serial:serial,name,dev_name:name,type,dev_type:type,status,dev_status:status});
      if(r){toast('Device updated.','success');closeModal('modal-device');renderDevices();renderStats()}
      else toast('Update failed.','danger');
    } else {
      const r=window.vitalwearDB.addDevice({serial,dev_serial:serial,name,dev_name:name,type,dev_type:type,status,dev_status:status});
      if(r){toast(`Device ${serial} registered.`,'success');closeModal('modal-device');renderDevices();renderStats()}
      else toast('Registration failed.','danger');
    }
  }

  function confirmDelete(id,serial){
    document.getElementById('del-msg').textContent=`Device "${serial}" will be permanently removed.`;
    document.getElementById('del-confirm-btn').onclick=()=>{
      const ok=window.vitalwearDB.deleteDevice(id);
      if(ok){toast('Device deleted.','success');renderDevices();renderStats()}
      else toast('Delete failed.','danger');
      closeModal('modal-del');
    };
    openModal('modal-del');
  }

  function openModal(id){document.getElementById(id).classList.add('open')}
  function closeModal(id){document.getElementById(id).classList.remove('open')}

  document.addEventListener('DOMContentLoaded',()=>{
    if(window.screenDetector&&window.screenDetector.disableForSmallScreens())return;
    checkAuth();
    const role=sessionStorage.getItem('current_role');
    const u=window.vitalwearDB.getUsers(role)[0]||{name:'Management'};
    document.getElementById('tb-username').textContent=u.name;
    document.getElementById('tb-avatar').textContent=u.name.charAt(0).toUpperCase();
    renderStats();
    renderDevices();
  });
</script>
</body>
</html>
